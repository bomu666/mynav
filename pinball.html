<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>波沐弹球 — Bomu Pinball</title>
<style>
:root {
  --bg:#0a0a14; --surface:#141428; --surface2:#1e1e3a; --border:#282850;
  --text:#e4e4f0; --text-dim:#8080a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  background:#000;overflow:hidden;height:100dvh;width:100vw;
  display:flex;align-items:center;justify-content:center;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#game-wrap{position:relative;width:100%;height:100dvh;max-width:500px;}
canvas{display:block;width:100%;height:100%;}
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;
  background:#222;color:#fff;padding:8px 20px;border-radius:20px;
  font-weight:700;font-size:0.85rem;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="game-wrap"><canvas id="cvs"></canvas></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 波沐弹球 — 原版素材完整移植
// ============================================================

// ──── Assets ────
const ATLAS_FILES = {
  game_obj:'sprites/game_obj.png', game_ui:'sprites/game_ui.png',
  home_ui:'sprites/home_ui.png', home_big:'sprites/home_big.png',
  block_anim:'sprites/block_anim.png', game_anim:'sprites/game_anim.png',
  public_ui:'sprites/public_ui.png', public_obj:'sprites/public_obj.png',
  loading_ui:'sprites/loading_ui.png', public_cover:'sprites/public_cover.png',
};
const ROLE_IDS = ['t1','t2','t3','t7','tu4','tu6','tuzi5'];

const IMG={}, PLIST={};
async function loadImg(k,u){return new Promise((R,J)=>{const i=new Image();i.onload=()=>{IMG[k]=i;R();};i.onerror=J;i.src=u;});}
async function loadPlist(k,u){
  const t=await(await fetch(u)).text();
  const doc=new DOMParser().parseFromString(t,'text/xml');
  const frames={};
  for(const d of doc.getElementsByTagName('dict')){
    const ks=d.getElementsByTagName('key');
    for(const K of ks){
      const name=K.textContent,n=K.nextElementSibling;
      if(!n||n.tagName!=='dict')continue;
      const g=s=>{for(const e of n.getElementsByTagName('key'))if(e.textContent===s)return e.nextElementSibling?.textContent;return null;};
      const fs=g('frame'),os=g('offset'),rot=g('rotated')==='true',ss=g('sourceSize');
      const pr=s=>{if(!s)return[0,0,0,0];const m=s.match(/\{(-?\d+),(-?\d+)\},\{(\d+),(\d+)\}/);return m?[+m[1],+m[2],+m[3],+m[4]]:[0,0,0,0];};
      const[fx,fy,fw,fh]=pr(fs);const[ox,oy]=pr(os);const[ssw,ssh]=ss?pr(ss).slice(2):[fw,fh];
      frames[name]={x:fx,y:fy,w:fw,h:fh,ox,oy,srcW:ssw||fw,srcH:ssh||fh,rotated:rot};
    }
  }
  PLIST[k]=frames;
}
function getF(atlas,name){return(PLIST[atlas]||{})[name]||null;}
function drawS(ctx,atlas,name,x,y,w,h,a){
  const img=IMG[atlas],f=getF(atlas,name);
  if(!img||!f)return false;
  if(f.rotated){ctx.save();ctx.translate(x+(w||f.h)/2,y+(h||f.w)/2);ctx.rotate(-Math.PI/2);ctx.drawImage(img,f.x,f.y,f.w,f.h,-(h||f.w)/2,-(w||f.h)/2,h||f.w,w||f.h);ctx.restore();}
  else ctx.drawImage(img,f.x,f.y,f.w,f.h,x,y,w||f.w,h||f.h);
  if(a!==undefined)ctx.globalAlpha=a;
  return true;
}

// ──── Game State ────
const COLS=5,MAX_ROWS=8;
let G={
  phase:'loading',layer:1,bricks:[],balls:[],gold:0,score:0,combo:0,
  maxLayer:+localStorage.getItem('bomu_ml')||1,maxScore:+localStorage.getItem('bomu_ms')||0,
  aimStart:null,aimCurrent:null,launching:false,
  role:0,ballId:101,ballCnt:10,ballLaunched:0,
  hammer:0,eye:0,eyeOn:false,hammerOn:false,
  spins:0,luckyP:false,luckyR:null,
  parts:[],speedMul:2,revives:3,
  unlock:JSON.parse(localStorage.getItem('bomu_unlocks')||'{"roles":[0],"balls":[101]}'),
  animTick:0,msg:'',
};
function save(){localStorage.setItem('bomu_ml',G.maxLayer);localStorage.setItem('bomu_ms',G.maxScore);localStorage.setItem('bomu_unlocks',JSON.stringify(G.unlock));}

// ──── Config ────
const ROLES=[
  {id:0,name:'阿弹',skill:null,cost:0,spine:'t1'},
  {id:1,name:'酷酷',skill:'crit5',cost:200,spine:'t2'},
  {id:2,name:'游戏王',skill:'dblG',cost:300,spine:'t3'},
  {id:3,name:'圆圆',skill:'plus5',cost:250,spine:'t7'},
  {id:4,name:'超兔',skill:'crit10',cost:500,spine:'tu4'},
  {id:5,name:'福娃娃',skill:'tripG',cost:600,spine:'tu6'},
  {id:6,name:'学霸',skill:'plus10',cost:400,spine:'tuzi5'},
];
const BALL_TYPES={
  pingpong:{id:101,name:'乒乓球',key:'ball_pingpong'},
  football:{id:106,name:'足球',key:'ball_football'},
  basketball:{id:105,name:'篮球',key:'ball_basketball'},
  baseball:{id:108,name:'棒球',key:'ball_baseball'},
  rugby:{id:107,name:'橄榄球',key:'ball_rugby'},
  darts:{id:110,name:'忍者镖',key:'ball_darts'},
  heart:{id:111,name:'红心',key:'ball_heart'},
  egg:{id:112,name:'彩蛋',key:'ball_egg'},
  diamond:{id:117,name:'钻石',key:'ball_diamonds'},
  snowflake:{id:115,name:'雪花',key:'ball_snowflake'},
  windmill:{id:116,name:'风车',key:'ball_windmill'},
  sjx:{id:109,name:'三角形',key:'ball_sjx'},
  square:{id:103,name:'方块',key:'ball_square'},
  small:{id:102,name:'小不点',key:'ball_small'},
  triangle:{id:118,name:'彩三角',key:'ball_triangle'},
  zfx:{id:104,name:'笑脸',key:'ball_zfx'},
  pingpong_s:{id:113,name:'太极',color:'#333'},
  gold_b:{id:114,name:'金币球',color:'#ffd700'},
  window:{id:119,name:'视窗',color:'#ce93d8'},
  wheel_b:{id:120,name:'轮盘球',color:'#ffab40'},
  rice:{id:121,name:'饭团',color:'#fff'},
};

// ──── Canvas ────
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
let W,H,S=1;
let boardL,boardR,boardT,boardB,brickW,brickH,brickG;
function resize(){
  const w=cvs.parentElement.clientWidth,h=cvs.parentElement.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cvs.width=w*dpr;cvs.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  W=w;H=h;S=Math.min(W/540,H/900);
  boardL=40*S;boardR=W-40*S;boardT=120*S;boardB=H-160*S;
  brickG=6*S;brickW=(boardR-boardL-(COLS-1)*brickG)/COLS;brickH=brickW*0.8;
}
window.addEventListener('resize',resize);

// ──── Input ────
function getP(e){const r=cvs.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
cvs.addEventListener('pointerdown',e=>{
  if(G.phase!=='play')return;
  if(G.hammerOn){const b=hitBrick(getP(e));if(b)doHammer(b);return;}
  G.aimStart=getP(e);G.aimCurrent=G.aimStart;
});
cvs.addEventListener('pointermove',e=>{
  if(G.phase!=='play'||!G.aimStart||G.launching)return;
  const p=getP(e);G.aimCurrent={x:p.x,y:Math.min(p.y,G.aimStart.y)}; // 只允许往上拖
});
cvs.addEventListener('pointerup',()=>{
  if(G.phase!=='play'||!G.aimStart||!G.aimCurrent||G.launching)return;
  // 方向：从aimStart指向aimCurrent，往上=aimCurrent.y更小=dy为负
  const dx=G.aimCurrent.x-G.aimStart.x, dy=G.aimCurrent.y-G.aimStart.y;
  const pow=Math.min(Math.hypot(dx,dy)/5,20), ang=Math.atan2(dy,dx);
  if(pow>2&&dy<-5)shoot(ang,pow); // dy必须为负=往上拖
  G.aimStart=G.aimCurrent=null;
});

// ──── Balls ────
function shoot(ang,pow){
  if(G.ballCnt<=0)return;
  G.balls.push({x:W/2,y:boardB+20*S,vx:Math.cos(ang)*pow,vy:Math.sin(ang)*pow,r:brickW*0.22,alive:true,crit:G.ballLaunched<getCrit(),trail:[]});
  G.ballCnt--;G.ballLaunched++;
}
function shootAll(){
  if(G.phase!=='play'||G.ballCnt<=0||G.launching)return;
  G.launching=true;const n=G.ballCnt,sp=Math.PI*0.45;
  for(let i=0;i<n;i++)setTimeout(()=>{const f=n>1?i/(n-1):0.5;shoot(-Math.PI/2-sp/2+sp*f,11+Math.random()*3);if(i===n-1)G.launching=false;},i*25);
}
function recall(){
  if(G.phase!=='play')return;
  const n=G.balls.filter(b=>b.alive).length;if(!n)return;
  G.balls.forEach(b=>b.alive=false);G.balls=[];G.ballCnt+=n;G.ballLaunched=Math.max(0,G.ballLaunched-n);
  toast('⬇️ 收回 '+n+' 球');
}
function getCrit(){const s=ROLES[G.role].skill;if(s==='crit5')return 5;if(s==='crit10')return 10;return 0;}

// ──── Bricks ────
function genLayer(ln){
  const bks=[],diff=Math.min(1+ln*0.12,3.5),rows=Math.min(MAX_ROWS,2+Math.floor(ln/2));
  const types=[{k:'normal',w:50},{k:'gold',w:12},{k:'lucky',w:5},{k:'move',w:8},{k:'dbl',w:7},{k:'myst',w:8},{k:'strip',w:5},{k:'tri',w:5}];
  let tw=0;types.forEach(t=>tw+=t.w);
  for(let r=0;r<rows;r++)for(let c=0;c<COLS;c++){
    let rv=Math.random()*tw;let tk=types[0];
    for(const t of types){rv-=t.w;if(rv<=0){tk=t;break;}}
    let hits=1;const mx=Math.floor(tk.k==='gold'?3*diff:tk.k==='lucky'?1:12*diff);
    if(tk.k==='lucky')hits=1;else if(tk.k==='gold')hits=1+Math.floor(Math.random()*Math.min(3,Math.floor(3*diff)));
    else if(tk.k==='dbl')hits=2+Math.floor(Math.random()*Math.min(8,Math.floor(6*diff)));
    else if(tk.k==='strip')hits=3+Math.floor(Math.random()*Math.min(17,Math.floor(10*diff)));
    else hits=1+Math.floor(Math.random()*mx);
    let td=null;if(tk.k==='tri')td=['upl','upr','lowl','lowr'][Math.floor(Math.random()*4)];
    bks.push({id:Math.random(),row:r,col:c,type:tk.k,triDir:td,hits,maxHits:hits,vis:true,hidden:tk.k==='myst',mvTimer:tk.k==='move'?60+Math.floor(Math.random()*120):0});
  }
  return bks;
}

// ──── Collision ────
function rcRect(rx,ry,rw,rh,cx,cy,cr){const cx2=Math.max(rx,Math.min(cx,rx+rw)),cy2=Math.max(ry,Math.min(cy,ry+rh));return(cx-cx2)**2+(cy-cy2)**2<cr**2;}
function brRect(b){return{x:boardL+b.col*(brickW+brickG),y:boardT+b.row*(brickH+brickG),w:brickW,h:brickH};}
function hitBrick(p){for(const b of G.bricks)if(b.vis){const r=brRect(b);if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h)return b;}return null;}

// ──── Game Loop ────
function hitB(brick,ball){
  const dmg=ball.crit?2:1;brick.hits-=dmg;G.combo++;
  const r=brRect(brick);
  for(let i=0;i<8;i++)G.parts.push({x:r.x+r.w/2,y:r.y+r.h/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:15+Math.random()*15,color:ball.crit?'#ff0':'#fff',sz:1+Math.random()*3});
  if(brick.hits<=0)destroyB(brick);
}
function destroyB(brick){
  brick.vis=false;const r=brRect(brick),role=ROLES[G.role];let g=brick.type==='gold'?3+Math.floor(Math.random()*6):1;
  if(role.skill==='dblG')g*=2;if(role.skill==='tripG')g*=3;G.gold+=g;G.score+=(brick.maxHits||1)*10;
  for(let i=0;i<15;i++)G.parts.push({x:r.x+r.w/2,y:r.y+r.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,life:20+Math.random()*20,color:brick.type==='gold'?'#ffd700':brick.type==='lucky'?'#0f0':'#7c5cfc',sz:2+Math.random()*4});
  if(brick.type==='lucky')G.luckyP=true;
}
function update(){
  if(G.phase!=='play')return;
  const sp=G.speedMul;G.animTick++;
  for(const b of G.balls){
    if(!b.alive)continue;
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>6)b.trail.shift();
    b.x+=b.vx*sp;b.y+=b.vy*sp;
    if(b.x-b.r<boardL){b.x=boardL+b.r;b.vx=Math.abs(b.vx);}
    if(b.x+b.r>boardR){b.x=boardR-b.r;b.vx=-Math.abs(b.vx);}
    if(b.y-b.r<boardT){b.y=boardT+b.r;b.vy=Math.abs(b.vy);}
    if(b.y>boardB+100*S){b.alive=false;continue;}
    for(const bk of G.bricks){
      if(!bk.vis)continue;
      const rr=brRect(bk);
      if(rcRect(rr.x,rr.y,rr.w,rr.h,b.x,b.y,b.r)){
        const cx=rr.x+rr.w/2,cy=rr.y+rr.h/2,dx=b.x-cx,dy=b.y-cy;
        if(Math.abs(dx)*rr.h>Math.abs(dy)*rr.w)b.vx=Math.abs(b.vx)*(dx>0?1:-1);
        else b.vy=Math.abs(b.vy)*(dy>0?1:-1);
        if(b.vy>0)b.y=rr.y-b.r;else b.y=rr.y+rr.h+b.r;
        if(b.vx>0)b.x=rr.x-b.r;else b.x=rr.x+rr.w+b.r;
        hitB(bk,b);break;
      }
    }
    const s=Math.hypot(b.vx,b.vy);if(s>22){b.vx*=22/s;b.vy*=22/s;}if(s<3){b.vx*=3/s;b.vy*=3/s;}
  }
  G.balls=G.balls.filter(b=>b.alive);
  for(const bk of G.bricks){if(!bk.vis||!bk.mvTimer)continue;bk.mvTimer--;if(bk.mvTimer<=0){const d=Math.random()>.5?1:-1,nc=bk.col+d;if(nc>=0&&nc<COLS&&!G.bricks.find(b=>b.vis&&b.row===bk.row&&b.col===nc))bk.col=nc;bk.mvTimer=60+Math.floor(Math.random()*120);}}
  for(const p of G.parts){p.x+=p.vx;p.y+=p.vy;p.life--;p.vy+=0.1;}
  G.parts=G.parts.filter(p=>p.life>0);
  if(!G.balls.length&&G.ballCnt<=0&&!G.launching)checkEnd();
}
function checkEnd(){
  const vis=G.bricks.filter(b=>b.vis);
  if(!vis.length){G.layer++;if(G.layer>G.maxLayer)G.maxLayer=G.layer;if(G.score>G.maxScore)G.maxScore=G.score;G.combo=0;G.ballCnt+=3+Math.floor(G.layer/5);G.phase='layerDone';setTimeout(()=>{if(G.luckyP||G.layer%3===0){G.luckyP=true;showWheel();}else nextLayer();},500);save();}
  else if(G.ballCnt<=0)gameOver();
}
function gameOver(){G.phase='over';if(G.score>G.maxScore)G.maxScore=G.score;if(G.layer>G.maxLayer)G.maxLayer=G.layer;save();}
function nextLayer(){G.bricks=genLayer(G.layer);const r=ROLES[G.role];let base=8+Math.floor(G.layer/3);if(r.skill==='plus5')base+=5;if(r.skill==='plus10')base+=10;G.ballCnt=Math.min(base,50);G.ballLaunched=0;G.balls=[];G.combo=0;G.eyeOn=false;G.luckyP=false;G.phase='play';}
function revive(){G.phase='play';const r=ROLES[G.role];let base=6+Math.floor(G.layer/4);if(r.skill==='plus5')base+=5;if(r.skill==='plus10')base+=10;G.ballCnt=Math.min(Math.max(base,5),50);G.ballLaunched=0;G.balls=[];G.combo=0;G.revives--;}

// ──── Items ────
function useHammer(){if(G.phase!=='play')return;if(G.hammer<=0){toast('无钱坤一击');return;}G.hammerOn=!G.hammerOn;if(G.hammerOn)toast('🔨 点击砖块');}
function doHammer(b){G.hammerOn=false;G.hammer--;b.hits=0;destroyB(b);setTimeout(()=>{if(!G.bricks.filter(b=>b.vis).length)checkEnd();},300);}
function useEye(){if(G.phase!=='play')return;if(G.eye<=0){toast('无透视之眼');return;}G.eye--;G.eyeOn=true;toast('👁️ 已显示');}

// ──── Wheel ────
const LCK=[
  {t:'换弹球',g:true},{t:'空包',g:false},{t:'隐藏数字!',g:false},{t:'层数+1!',g:false},
  {t:'3砖翻倍!',g:false},{t:'-10球!',g:false},{t:'+10球!',g:true},{t:'3砖减半!',g:true},
  {t:'半数暴击!',g:true},{t:'全暴击!',g:true},{t:'+1钱坤',g:true,it:'h',n:1},{t:'+2透视',g:true,it:'e',n:2},
  {t:'+1透视',g:true,it:'e',n:1},{t:'+2钱坤',g:true,it:'h',n:2},{t:'+20金币',g:true,gd:20},{t:'+50金币',g:true,gd:50},{t:'免费复活',g:false,rv:true},
];
function spinWheel(){if(G.phase!=='play')return;if(G.spins>=2&&G.gold<30){toast('需30金币');return;}if(G.spins>=2)G.gold-=30;G.spins++;G.luckyP=true;showWheel();}
function showWheel(){G.phase='wheel';G.luckyR=LCK[Math.floor(Math.random()*LCK.length)];}
function applyLucky(){const r=G.luckyR;if(!r){closeMsg();nextLayer();return;}
  if(r.it==='h')G.hammer+=r.n;if(r.it==='e')G.eye+=r.n;if(r.gd)G.gold+=r.gd;
  if(r.t.includes('-10球'))G.ballCnt=Math.max(1,G.ballCnt-10);
  if(r.t.includes('+10球'))G.ballCnt+=10;
  if(r.t.includes('全暴击'))G.ballLaunched=999;
  if(r.t.includes('半数暴击'))for(let i=0;i<G.balls.length/2;i++)G.balls[i].crit=true;
  if(r.t.includes('隐藏数字'))G.bricks.forEach(b=>b.hidden=true);
  if(r.t.includes('翻倍')){const t=G.bricks.filter(b=>b.vis).sort(()=>Math.random()-.5).slice(0,3);t.forEach(b=>{b.hits*=2;b.maxHits*=2;});}
  if(r.t.includes('减半')){const t=G.bricks.filter(b=>b.vis).sort(()=>Math.random()-.5).slice(0,3);t.forEach(b=>b.hits=Math.max(1,Math.floor(b.hits/2)));}
  if(r.t.includes('层数+1'))G.layer++;
  if(r.t.includes('换弹球'))G.ballId=Object.values(BALL_TYPES).find(b=>G.unlock.balls.includes(b.id))?.id||101;
  closeMsg();nextLayer();
}
function closeMsg(){const m=document.getElementById('msg');if(m)m.remove();}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}

// ──── Render ────
function render(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,W,H);

  if(G.phase==='loading'){ctx.fillStyle='#fff';ctx.font='20px sans-serif';ctx.textAlign='center';ctx.fillText('加载中...',W/2,H/2);return;}
  if(G.phase==='menu'){drawMenu();return;}
  if(G.phase==='wheel'){drawGame();drawWheelMsg();return;}
  if(G.phase==='over'){drawGame();drawOverMsg();return;}

  // Game scene
  drawGame();
  if(G.hammerOn){ctx.strokeStyle='#ffd700';ctx.lineWidth=3;ctx.setLineDash([8,4]);ctx.strokeRect(boardL-3,boardT-3,boardR-boardL+6,boardB-boardT+6);ctx.setLineDash([]);ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('🔨 点击砖块',W/2,boardT-10);}
}
function drawGame(){
  // Background
  const bgH=(boardB-boardT)*1.5;
  if(IMG['game_obj']){
    // Draw play_bg tiled or stretched
    const f=getF('game_obj','play_bg.png');
    if(f)ctx.drawImage(IMG['game_obj'],f.x,f.y,f.w,f.h,0,boardT-bgH*0.1,W,bgH*1.1);
  }
  // Board bg overlay
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(boardL-4,boardT-4,boardR-boardL+8,boardB-boardT+8);

  // Brick shadows
  for(const b of G.bricks){
    if(!b.vis)continue;
    const r=brRect(b);
    let shKey='play_brick_shadow_normal.png';
    if(b.type==='strip')shKey='play_brick_shadow_strip.png';
    else if(b.type==='tri'){
      if(b.triDir==='lowl')shKey='play_brick_shadow_triangle_bl.png';
      else if(b.triDir==='lowr')shKey='play_brick_shadow_triangle_br.png';
      else if(b.triDir==='upl')shKey='play_brick_shadow_triangle_tl.png';
      else if(b.triDir==='upr')shKey='play_brick_shadow_triangle_tr.png';
    }
    drawS(ctx,'game_obj',shKey,r.x-8*S,r.y-8*S,r.w+16*S,r.h+16*S);
  }

  // Bricks
  for(const b of G.bricks){
    if(!b.vis)continue;
    const r=brRect(b),hit=b.hits/b.maxHits<=0.5;
    let key='play_brick_normal.png';
    switch(b.type){
      case'gold':key=hit?'play_brick_gold_hit.png':'play_brick_gold.png';break;
      case'lucky':key='play_brick_lucky_hit.png';break;
      case'move':key=hit?'play_brick_move_hit.png':'play_brick_move.png';break;
      case'dbl':key=hit?'play_brick_double_hit.png':'play_brick_double.png';break;
      case'strip':key=hit?'play_brick_strip_hit.png':'play_brick_strip.png';break;
      case'myst':key=G.eyeOn||!b.hidden?(hit?'play_brick_normal_hit.png':'play_brick_normal.png'):'play_brick_lucky.png';break;
      case'tri':key='play_brick_triangle_'+b.triDir+(hit?'_hit':'')+'.png';break;
      default:key=hit?'play_brick_normal_hit.png':'play_brick_normal.png';
    }
    const pad=2*S;drawS(ctx,'game_obj',key,r.x+pad,r.y+pad,r.w-pad*2,r.h-pad*2);
    // Gold icon
    if(b.type==='gold')drawS(ctx,'game_obj','play_brick_goldicon.png',r.x+r.w-14*S,r.y+2*S,12*S,12*S);

    // Number
    const show=G.eyeOn||!b.hidden;
    if(show&&b.hits>0){
      const ns=b.hits.toString(),nw=ns.length*10*S;
      for(let i=0;i<ns.length;i++){
        const d=ns[i];
        drawS(ctx,'public_ui','play_zksz_'+d+'.png',r.x+r.w/2-nw/2+i*10*S,r.y+r.h/2-8*S,10*S,16*S);
      }
    }else if(!show){
      drawS(ctx,'public_ui','play_zksz_w.png',r.x+r.w/2-8*S,r.y+r.h/2-8*S,16*S,16*S);
    }
  }

  // Floor
  const flW=120*S,flH=60*S;
  drawS(ctx,'game_obj','play_floor_ch.png',W/2-flW/2,boardB-10*S,flW,flH);

  // Aim line
  if(G.aimStart&&G.aimCurrent&&G.phase==='play'){
    const dx=G.aimStart.x-G.aimCurrent.x,dy=G.aimStart.y-G.aimCurrent.y;
    const pow=Math.min(Math.hypot(dx,dy)/5,20),ang=Math.atan2(dy,dx);
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5*S;ctx.setLineDash([6*S,4*S]);
    ctx.beginPath();ctx.moveTo(W/2,boardB+10*S);ctx.lineTo(W/2+Math.cos(ang)*(120+pow*10)*S,boardB+10*S+Math.sin(ang)*(120+pow*10)*S);ctx.stroke();ctx.setLineDash([]);
    // Power indicator
    drawS(ctx,'game_obj','play_arrow.png',W/2-13*S,boardB-50*S-pow*3*S,26*S,30*S);
  }

  // Balls
  for(const b of G.balls){
    if(!b.alive)continue;
    // Trail
    if(b.trail.length>1){
      ctx.strokeStyle=b.crit?'rgba(255,80,80,0.3)':'rgba(255,255,255,0.1)';
      ctx.lineWidth=b.r;ctx.beginPath();ctx.moveTo(b.trail[0].x,b.trail[0].y);
      for(let i=1;i<b.trail.length;i++)ctx.lineTo(b.trail[i].x,b.trail[i].y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
    // Ball sprite
    const bt=Object.values(BALL_TYPES).find(x=>x.id===G.ballId)||BALL_TYPES.pingpong;
    const bkey=bt.key?bt.key+'_normal.png':null;
    const bcrit=bt.key?bt.key+'_crit.png':null;
    const br=b.r*2.5;
    let drawn=false;
    if(b.crit&&bcrit)drawS(ctx,'public_obj',bcrit,b.x-br/2,b.y-br/2,br,br);
    else if(bkey){drawn=drawS(ctx,'public_obj',bkey,b.x-br/2,b.y-br/2,br,br);}
    if(!drawn){
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=bt.color||'#fff';ctx.fill();
    }
    if(b.crit){
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.strokeStyle='#ff4757';ctx.lineWidth=1.5;ctx.globalAlpha=0.5+Math.sin(Date.now()/80)*0.5;ctx.stroke();ctx.globalAlpha=1;
    }
  }

  // Particles
  for(const p of G.parts){ctx.fillStyle=p.color;ctx.globalAlpha=Math.min(1,p.life/30);ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;

  // Top UI bar
  const barY=boardT-50*S;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,barY,W,45*S);
  ctx.fillStyle='#fff';ctx.font=(12*S)+'px sans-serif';ctx.textAlign='left';
  ctx.fillText('层'+G.layer,10*S,barY+28*S);
  ctx.textAlign='center';ctx.fillText('球×'+(G.ballCnt+G.balls.filter(b=>b.alive).length),W/2,barY+28*S);
  ctx.textAlign='right';ctx.fillText('💰'+G.gold,W-80*S,barY+28*S);
  ctx.fillText('🔥×'+(G.combo||1),W-10*S,barY+28*S);

  // Bottom controls
  const by=H-40*S;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,by,W,40*S);
  const btns=['🔨'+G.hammer,'👁️'+G.eye,'🎲','⏩'+G.speedMul+'×','⬇️'];
  ctx.fillStyle='#fff';ctx.font=(11*S)+'px sans-serif';ctx.textAlign='center';
  for(let i=0;i<btns.length;i++)ctx.fillText(btns[i],W/(btns.length+1)*(i+1),by+26*S);
}
function drawMenu(){
  // Home bg
  if(IMG['home_ui']){
    const f=getF('home_ui','home_bg.png');
    if(f)ctx.drawImage(IMG['home_ui'],f.x,f.y,f.w,f.h,0,0,W,H);
  }
  // Logo
  drawS(ctx,'home_ui','home_logo_ch.png',W/2-120*S,30*S,240*S,80*S);
  // Start button
  drawS(ctx,'home_ui','home_button_start.png',W/2-100*S,H/2-20*S,200*S,60*S);
  // Other buttons
  drawS(ctx,'home_ui','home_button_role_a.png',W/2-140*S,H/2+60*S,80*S,40*S);
  drawS(ctx,'home_ui','home_button_shop.png',W/2-40*S,H/2+60*S,80*S,40*S);
  drawS(ctx,'home_ui','home_button_box.png',W/2+60*S,H/2+60*S,80*S,40*S);
  // Title
  ctx.fillStyle='#fff';ctx.font='bold '+(16*S)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('波沐弹球',W/2,H/2+140*S);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=(10*S)+'px sans-serif';
  ctx.fillText('Bomu Pinball · 最高层'+G.maxLayer+' · 💰'+G.gold,W/2,H/2+160*S);
}
function drawWheelMsg(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  const r=G.luckyR;
  ctx.fillStyle='#fff';ctx.font='bold '+(18*S)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('🎰 幸运轮盘',W/2,H/2-60*S);
  ctx.font=(14*S)+'px sans-serif';
  ctx.fillText(r?r.t:'',W/2,H/2);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font=(11*S)+'px sans-serif';
  ctx.fillText('点击屏幕继续',W/2,H/2+50*S);
}
function drawOverMsg(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold '+(20*S)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('挑战失败',W/2,H/2-50*S);
  ctx.font=(14*S)+'px sans-serif';
  ctx.fillText('层数:'+G.layer+'  金币:'+G.gold+'  得分:'+G.score,W/2,H/2);
  ctx.fillText('最高:层'+G.maxLayer+' / '+G.maxScore+'分',W/2,H/2+30*S);
  ctx.fillText('🔄点击复活('+G.revives+') | 🔁重来 | 🏠菜单',W/2,H/2+70*S);
}

// ──── Click Handling ────
function handleClick(x,y){
  if(G.phase==='menu'){
    const cy=H/2;
    if(y>cy-40*S&&y<cy+20*S){startGame();return;} // Start
    if(y>cy+60*S&&y<cy+100*S){
      if(x<W/2-60*S)showRoles();else if(x<W/2+60*S)showShop();// role / shop
    }
    return;
  }
  if(G.phase==='wheel'){applyLucky();return;}
  if(G.phase==='over'){
    if(y>H/2+50*S&&y<H/2+90*S){
      if(x<W/3){if(G.revives>0){revive();}else{startGame();}}
      else if(x<W*2/3){startGame();}else{G.phase='menu';}
    }
    return;
  }
  if(G.phase==='play'){
    const by=H-40*S;if(y<by)return;
    const bw=W/6;
    if(x<bw)useHammer();
    else if(x<bw*2)useEye();
    else if(x<bw*3)spinWheel();
    else if(x<bw*4)toggleSpeed();
    else if(x<bw*5)recall();
    else shootAll();
  }
}
function toggleSpeed(){const sp=[1,2,4,8],i=sp.indexOf(G.speedMul);G.speedMul=sp[(i+1)%4];toast('速度:'+G.speedMul+'×');}
function startGame(){G.phase='play';G.layer=1;G.score=0;G.combo=0;G.spins=0;G.hammerOn=false;G.eyeOn=false;G.revives=3;const r=ROLES[G.role];let b=10;if(r.skill==='plus5')b+=5;if(r.skill==='plus10')b+=10;G.ballCnt=b;G.ballLaunched=0;G.balls=[];G.bricks=genLayer(1);}
function showShop(){toast('🏪 商店 - 钱坤一击 💰20 | 透视之眼 💰15');}
function showRoles(){toast('👤 角色选择 - 点击底部切换');}

cvs.addEventListener('click',e=>{const p=getP(e);handleClick(p.x,p.y);});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(G.hammerOn){G.hammerOn=false;return;}G.phase='menu';}
  if(e.key===' '&&G.phase==='play'){e.preventDefault();shootAll();}
  if(e.key==='h')useHammer();if(e.key==='e')useEye();if(e.key==='w')spinWheel();
  if(e.key==='s')toggleSpeed();if(e.key==='r')recall();
});

// ──── Main Loop ────
function loop(){resize();update();render();requestAnimationFrame(loop);}

async function init(){
  resize();
  // Load all assets
  const proms=[];
  for(const[k,u]of Object.entries(ATLAS_FILES)){proms.push(loadImg(k,u));proms.push(loadPlist(k,u.replace('.png','.plist')).catch(()=>{}));}
  for(const rid of ROLE_IDS)proms.push(loadImg('role_'+rid,'sprites/role/'+rid+'.png'));
  try{await Promise.all(proms);}catch(e){console.error(e);}
  G.phase='menu';requestAnimationFrame(loop);
}
init();
</script>
