<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>波沐弹球 — Bomu Pinball</title>
<meta name="description" content="波沐游戏出品 — 数字砖块弹球，还原经典玩法">
<style>
:root {
  --bg:#0a0a14; --surface:#141428; --surface2:#1e1e3a; --border:#282850;
  --text:#e4e4f0; --text-dim:#8080a8; --primary:#7c5cfc; --primary-glow:rgba(124,92,252,0.25);
  --green:#00d69c; --blue:#54a0ff; --orange:#ff9f43; --pink:#ff6b81;

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;

}
#game-wrap { position:relative; width:100%; max-width:540px; height:100dvh; display:flex; flex-direction:column; }
#top-bar { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; gap:6px; flex-shrink:0; }
#top-bar .logo { font-size:1rem; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
#stats-row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; padding:2px 8px; font-size:0.72rem; color:var(--text-dim); flex-shrink:0; }
#stats-row span { background:var(--surface2); padding:2px 8px; border-radius:8px; }
#stats-row .gold { color:var(--gold); }
#cvs-wrap { flex:1; position:relative; min-height:0; }
canvas { display:block; width:100%; height:100%; }
#action-bar { display:flex; gap:6px; padding:6px; justify-content:center; flex-wrap:wrap; flex-shrink:0; }
#action-bar button {
  padding:6px 12px; border-radius:16px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); cursor:pointer;
  font-size:0.75rem; font-weight:600; transition:all 0.2s; font-family:inherit; white-space:nowrap;
}
#action-bar button:hover { border-color:var(--primary); box-shadow:0 0 10px var(--primary-glow); }
#action-bar button:disabled { opacity:0.4; pointer-events:none; }
#action-bar .btn-p { background:var(--primary); color:#fff; border-color:var(--primary); }
#action-bar .btn-g { background:var(--gold); color:#000; border-color:var(--gold); }
.modal-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px);

@keyframes fi { from{opacity:0} to{opacity:1} }
.modal {

  box-shadow:0 16px 48px rgba(0,0,0,0.6); animation:su 0.25s;
}
@keyframes su { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h2 { font-size:1.1rem; margin-bottom:10px; text-align:center; }
.modal .acts { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
.modal button {
  padding:8px 16px; border-radius:18px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); cursor:pointer;
  font-size:0.82rem; font-weight:600; font-family:inherit; transition:all 0.2s;
}
.modal button:hover { border-color:var(--primary); }
.modal .btn-p { background:var(--primary); color:#fff; border-color:var(--primary); }
.modal .btn-g { background:var(--gold); color:#000; border-color:var(--gold); }
.sel-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:6px; }
.sel-card { background:var(--surface2); border:2px solid var(--border); border-radius:8px; padding:8px; cursor:pointer; text-align:center; transition:all 0.2s; font-size:0.75rem; }
.sel-card:hover { border-color:var(--primary); transform:translateY(-1px); }
.sel-card.on { border-color:var(--primary); background:rgba(124,92,252,0.2); }
.sel-card .em { font-size:1.6rem; display:block; }
.sel-card.lock { opacity:0.4; pointer-events:none; }
.toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:200; background:var(--green); color:#000; padding:8px 20px; border-radius:20px; font-weight:700; font-size:0.85rem; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }
.toast.warn { background:var(--orange); }
.hidden { display:none !important; }
</style>

<script>
// ===================================================================
// 波沐弹球 — 使用原版精灵素材
// ===================================================================

// ──── Asset Loader ────
const IMG = {};
const PLIST = {}; // parsed frame data
const ATLAS = {
  game_obj: 'sprites/game_obj.png',
  game_ui: 'sprites/game_ui.png',
  home_ui: 'sprites/home_ui.png',
  home_big: 'sprites/home_big.png',
  block_anim: 'sprites/block_anim.png',
  game_anim: 'sprites/game_anim.png',
  public_ui: 'sprites/public_ui.png',
  public_obj: 'sprites/public_obj.png',
  loading_ui: 'sprites/loading_ui.png',
  public_cover: 'sprites/public_cover.png',
};

function loadImage(key, url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => { IMG[key] = img; resolve(); };
    img.onerror = reject;
    img.src = url;
  });
}

async function loadPlist(key, url) {
  const resp = await fetch(url);
  const xml = await resp.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const frames = {};
  const dicts = doc.getElementsByTagName('dict');
  for (const dict of dicts) {
    const keys = dict.getElementsByTagName('key');
    for (const k of keys) {
      const name = k.textContent;
      const next = k.nextElementSibling;
      if (!next || next.tagName !== 'dict') continue;
      const d = next;
      const getVal = (s) => {
        const el = d.getElementsByTagName('key');
        for (const e of el) {
          if (e.textContent === s) {
            const n = e.nextElementSibling;
            return n ? n.textContent : null;
          }
        }
        return null;
      };
      const frameStr = getVal('frame');
      const offsetStr = getVal('offset');
      const rotated = getVal('rotated') === 'true';
      const srcSizeStr = getVal('sourceSize');
      const srcRectStr = getVal('sourceColorRect');

      const parseRect = (s) => {
        if (!s) return [0,0,0,0];
        const m = s.match(/\{(-?\d+),(-?\d+)\},\{(\d+),(\d+)\}/);
        return m ? [parseInt(m[1]),parseInt(m[2]),parseInt(m[3]),parseInt(m[4])] : [0,0,0,0];
      };

      const [fx,fy,fw,fh] = parseRect(frameStr);
      const [ox,oy] = offsetStr ? parseRect(offsetStr) : [0,0];
      const [ssw,ssh] = srcSizeStr ? parseRect(srcSizeStr).slice(2) : [fw,fh];
      const srcRect = parseRect(srcRectStr);

      frames[name] = {
        x:fx, y:fy, w:fw, h:fh,
        ox, oy,
        srcW:ssw||fw, srcH:ssh||fh,
        rotated,
        srcX:srcRect[0]||0, srcY:srcRect[1]||0,
        srcRX:srcRect[2]||fw, srcRY:srcRect[3]||fh,
      };
    }
  }
  PLIST[key] = frames;
}

async function loadAllAssets() {
  const loads = [];
  for (const [k, v] of Object.entries(ATLAS)) {
    loads.push(loadImage(k, v));
    const plistUrl = v.replace('.png', '.plist');
    loads.push(loadPlist(k, plistUrl).catch(() => {}));
  }
  // Also load role PNGs
  for (const rid of ['t1','t2','t3','t7','tu4','tu6','tuzi5']) {
    loads.push(loadImage('role_'+rid, 'sprites/role/'+rid+'.png'));
  }
  await Promise.all(loads);
}

// ──── Sprite Drawing ────
function drawSprite(ctx, atlasKey, frameName, dx, dy, dw, dh) {
  const img = IMG[atlasKey];
  const frames = PLIST[atlasKey];
  if (!img || !frames || !frames[frameName]) return false;
  const f = frames[frameName];
  if (f.rotated) {
    ctx.save();
    ctx.translate(dx + dw/2, dy + dh/2);
    ctx.rotate(-Math.PI/2);
    ctx.drawImage(img, f.x, f.y, f.w, f.h, -dh/2, -dw/2, dh, dw);
    ctx.restore();
  } else {
    ctx.drawImage(img, f.x, f.y, f.w, f.h, dx, dy, dw||f.w, dh||f.h);
  }
  return true;
}

function getFrame(atlasKey, frameName) {
  const frames = PLIST[atlasKey];
  return frames ? frames[frameName] : null;
}

// ──── Game State ────
let G = null;

function createGame() {
  return {
    phase: 'loading',
    layer: 1, bricks: [], balls: [], gold: 0, score: 0, combo: 0,
    maxLayer: parseInt(localStorage.getItem('bomu_ml')||'1'),
    maxScore: parseInt(localStorage.getItem('bomu_ms')||'0'),
    aimStart: null, aimCurrent: null, launching: false,
    activeRole: 0, activeBall: 101,
    ballsInRound: 10, totalBallsLaunched: 0,
    hammerCount: 0, eyeCount: 0, eyeActive: false, hammerMode: false,
    wheelSpins: 0, luckyPending: false, luckyResult: null,
    particles: [], speedMultiplier: 2,
    unlocks: JSON.parse(localStorage.getItem('bomu_unlocks')||'{"roles":[0],"balls":[101]}'),
  };
}

function save() {
  localStorage.setItem('bomu_ml', G.maxLayer);
  localStorage.setItem('bomu_ms', G.maxScore);
  localStorage.setItem('bomu_unlocks', JSON.stringify(G.unlocks));
}

// ──── Helpers ────
const rng=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rngF=(a,b)=>Math.random()*(b-a)+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const dist=(a,b)=>Math.hypot(a.x-b.x,b.y-b.y);

function weightedPick(items, wk) {
  const t=items.reduce((s,i)=>s+i[wk],0); let r=Math.random()*t;
  for(const i of items){r-=i[wk];if(r<=0)return i;}
  return items[items.length-1];
}

// ──── Config ────
const COLS=5;

const ROLES=[
  {id:0,name:'阿弹',emoji:'😊',desc:'没有特别技能，但很温柔',skill:null,cost:0,spine:'t1'},
  {id:1,name:'酷酷',emoji:'😎',desc:'携带5颗暴击球入场',skill:'crit5',cost:200,spine:'t2'},
  {id:2,name:'游戏王',emoji:'👑',desc:'获得双倍金币',skill:'doubleGold',cost:300,spine:'t3'},
  {id:3,name:'圆圆',emoji:'🌟',desc:'入场自带+5颗球',skill:'plus5',cost:250,spine:'t7'},
  {id:4,name:'超兔',emoji:'🐰',desc:'携带10颗暴击球',skill:'crit10',cost:500,spine:'tu4'},
  {id:5,name:'福娃娃',emoji:'👧',desc:'三倍金币！富家千金',skill:'tripleGold',cost:600,spine:'tu6'},
  {id:6,name:'学霸',emoji:'🤓',desc:'自带10颗初始球入场',skill:'plus10',cost:400,spine:'tuzi5'},

const BALLS=[

  {id:102,name:'小不点',color:'#ff4444'},

  {id:110,name:'忍者镖',color:'#silver'},
  {id:111,name:'红心',color:'#ff1744'},
  {id:112,name:'彩蛋',color:'#rainbow'},
  {id:113,name:'太极',color:'#333'},
  {id:114,name:'金币球',color:'#ffd700'},
  {id:115,name:'雪花',color:'#e0f7fa'},
  {id:116,name:'风车',color:'#80deea'},
  {id:117,name:'钻石',color:'#b3e5fc'},
  {id:118,name:'彩三角',color:'#ff80ab'},
  {id:119,name:'视窗',color:'#ce93d8'},
  {id:120,name:'轮盘球',color:'#ffab40'},
  {id:121,name:'饭团',color:'#fff'},
];

const BRICK_SPRITES = {
  normal: ['play_brick_normal.png','play_brick_normal_hit.png'],
  gold: ['play_brick_gold.png','play_brick_gold_hit.png'],
  lucky: ['play_brick_lucky.png','play_brick_lucky_hit.png'],
  move: ['play_brick_move.png','play_brick_move_hit.png'],
  double: ['play_brick_double.png','play_brick_double_hit.png'],
  strip: ['play_brick_strip.png','play_brick_strip_hit.png'],
  tri_upl: ['play_brick_triangle_upl.png','play_brick_triangle_upl_hit.png'],
  tri_upr: ['play_brick_triangle_upr.png','play_brick_triangle_upr_hit.png'],
  tri_lowl: ['play_brick_triangle_lowl.png','play_brick_triangle_lowl_hit.png'],
  tri_lowr: ['play_brick_triangle_lowr.png','play_brick_triangle_lowr_hit.png'],
};

const LUCKY_RESULTS=[
  {text:'下一回合随机换一种弹球',good:true},
  {text:'白来一趟，什么都没有！',good:false},
  {text:'所有砖块数字隐藏！',good:false},
  {text:'下一回合砖块层数+1！',good:false},
  {text:'随机三个砖块数字翻倍！',good:false},
  {text:'弹球减少10个！',good:false},
  {text:'弹球增加10个！',good:true},
  {text:'随机三个砖块数字减半！',good:true},
  {text:'一半球变为暴击球！',good:true},
  {text:'全部球变为暴击球！',good:true},
  {text:'获得1个钱坤一击！',good:true,item:'hammer',amount:1},
  {text:'获得2个透视之眼！',good:true,item:'eye',amount:2},
  {text:'获得1个透视之眼！',good:true,item:'eye',amount:1},
  {text:'获得2个钱坤一击！',good:true,item:'hammer',amount:2},
  {text:'获得20个金币！',good:true,gold:20},
  {text:'获得50个金币！',good:true,gold:50},
  {text:'下次复活免费',good:false,freeRevive:true},
];

// ──── Brick Generation ────
function generateLayer(ln) {
  const bricks=[];
  const diff=Math.min(1+ln*0.15,4);
  const rows=Math.min(6,2+Math.floor(ln/2));
  const types=[
    {k:'normal',w:55,minH:1,maxH:15},
    {k:'gold',w:12,minH:1,maxH:4},
    {k:'lucky',w:5,minH:1,maxH:3},
    {k:'move',w:8,minH:2,maxH:10},
    {k:'double',w:8,minH:2,maxH:8},
    {k:'mystery',w:7,minH:1,maxH:12},
    {k:'strip',w:3,minH:3,maxH:20},
    {k:'tri',w:2,minH:2,maxH:10},
  ];

  for(let r=0;r<rows;r++){
    for(let c=0;c<COLS;c++){
      const t=weightedPick(types,'w');
      let hits=rng(t.minH,Math.min(t.maxH,Math.floor(t.maxH*diff)));
      if(t.k==='lucky')hits=1;
      if(t.k==='gold')hits=rng(1,Math.min(3,Math.floor(3*diff)));
      let triDir=null;
      if(t.k==='tri')triDir=pick(['upl','upr','lowl','lowr']);
      bricks.push({
        id:Date.now()+Math.random(),row:r,col:c,
        type:t.k,triDir,hits,maxHits:hits,visible:true,
        hidden:(t.k==='mystery'),moveTimer:(t.k==='move'?rng(60,180):0),
      });
    }
  }
  return bricks;
}

// ──── Canvas Setup ────
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');
let cw,ch,brickW,brickH,brickGap,boardTop,boardBottom,boardLeft,boardRight;

function resize(){
  const wrap=document.getElementById('cvs-wrap');
  cw=wrap.clientWidth;ch=wrap.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cvs.width=cw*dpr;cvs.height=ch*dpr;
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
  boardLeft=10;boardRight=cw-10;boardTop=10;boardBottom=ch-140;
  brickGap=3;
  brickW=(boardRight-boardLeft-(COLS-1)*brickGap)/COLS;
  brickH=Math.min(brickW*0.75,(boardBottom-boardTop)/13);
}
window.addEventListener('resize',resize);

// ──── Input ────
function getPos(e){const r=cvs.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
cvs.addEventListener('pointerdown',e=>{
  if(G.phase!=='playing')return;
  if(G.hammerMode){const b=hitTestBrick(getPos(e));if(b)hammerHit(b);return;}
  G.aimStart=getPos(e);G.aimCurrent=G.aimStart;
});
cvs.addEventListener('pointermove',e=>{
  if(G.phase!=='playing'||!G.aimStart||G.launching)return;
  G.aimCurrent=getPos(e);
  if(G.aimCurrent.y>G.aimStart.y)G.aimCurrent.y=G.aimStart.y;
});
cvs.addEventListener('pointerup',e=>{
  if(G.phase!=='playing'||!G.aimStart||!G.aimCurrent||G.launching)return;
  const dx=G.aimStart.x-G.aimCurrent.x,dy=G.aimStart.y-G.aimCurrent.y;
  const power=Math.min(Math.hypot(dx,dy)/5,18);
  const angle=Math.atan2(dy,dx);
  if(power>2&&dy>5)launchBall(angle,power);
  G.aimStart=null;G.aimCurrent=null;
});

// ──── Ball Physics ────
function spawnBall(angle,power,isCrit){
  const sx=cw/2,sy=boardBottom+30;
  return {x:sx,y:sy,vx:Math.cos(angle)*power,vy:Math.sin(angle)*power, r:brickW*0.2,active:true,isCrit,trail:[],bounced:0};
}
function launchBall(angle,power){
  if(G.ballsInRound<=0)return;
  G.balls.push(spawnBall(angle,power,G.totalBallsLaunched<getCritCount()));
  G.ballsInRound--;G.totalBallsLaunched++;
}
function launchAll(){
  if(G.phase!=='playing'||G.ballsInRound<=0)return;
  G.launching=true;
  const cnt=G.ballsInRound,spread=Math.PI*0.4;
  for(let i=0;i<cnt;i++)setTimeout(()=>{
    const f=cnt>1?i/(cnt-1):0.5;
    launchBall(-Math.PI/2-spread/2+spread*f,10+Math.random()*4);
  },i*30);
  setTimeout(()=>{G.launching=false;},cnt*30+100);
}
function recallAll(){
  if(G.phase!=='playing')return;
  const cnt=G.balls.filter(b=>b.active).length;
  if(cnt===0){showToast('没有球在场上了','warn');return;}
  G.balls.forEach(b=>b.active=false);
  G.balls=[];G.ballsInRound+=cnt;
  G.totalBallsLaunched=Math.max(0,G.totalBallsLaunched-cnt);
  showToast('⬇️ 收回了 '+cnt+' 颗弹球','');updateUI();
}
function toggleSpeed(){
  const spds=[1,2,4,8];const cur=spds.indexOf(G.speedMultiplier);
  G.speedMultiplier=spds[(cur+1)%spds.length];
  document.getElementById('btn-speed').textContent='⏩'+G.speedMultiplier+'×';
  showToast('⏩ 速度：'+G.speedMultiplier+'×',G.speedMultiplier>=4?'warn':'');
}
function getCritCount(){
  const s=ROLES[G.activeRole].skill;
  if(s==='crit5')return 5;if(s==='crit10')return 10;return 0;
}

// ──── Collision ────
function rectCircle(rx,ry,rw,rh,cx,cy,cr){
  const cx2=Math.max(rx,Math.min(cx,rx+rw)),cy2=Math.max(ry,Math.min(cy,ry+rh));
  return(cx-cx2)**2+(cy-cy2)**2<cr**2;
}
function getBrickRect(b){
  const x=boardLeft+b.col*(brickW+brickGap),y=boardTop+b.row*(brickH+brickGap);
  return{x,y,w:brickW,h:brickH};
}
function hitTestBrick(pos){
  for(const b of G.bricks){if(!b.visible)continue;const r=getBrickRect(b);if(pos.x>=r.x&&pos.x<=r.x+r.w&&pos.y>=r.y&&pos.y<=r.y+r.h)return b;}
  return null;
}
function brickAt(row,col){return G.bricks.find(b=>b.visible&&b.row===row&&b.col===col);}

// ──── Game Loop ────
function hitBrick(brick,ball){
  const dmg=ball.isCrit?2:1;brick.hits-=dmg;G.combo++;
  const r=getBrickRect(brick);
  for(let i=0;i<6;i++)G.particles.push({x:r.x+r.w/2,y:r.y+r.h/2,vx:rngF(-3,3),vy:rngF(-4,-1),life:rng(10,25),color:ball.isCrit?'#ff4757':'#ffd700',size:rng(1,3)});
  if(brick.hits<=0)destroyBrick(brick);
}
function destroyBrick(brick){
  brick.visible=false;const r=getBrickRect(brick),role=ROLES[G.activeRole];
  let g=BRICK_TYPES[brick.type]?.isGold?rng(3,8):1;
  if(role.skill==='doubleGold')g*=2;if(role.skill==='tripleGold')g*=3;
  G.gold+=g;G.score+=(brick.maxHits||1)*10;
  for(let i=0;i<12;i++)G.particles.push({x:r.x+r.w/2,y:r.y+r.h/2,vx:rngF(-4,4),vy:rngF(-5,-1),life:rng(15,35),color:brick.type==='gold'?'#ffd700':brick.type==='lucky'?'#00ff88':'#7c5cfc',size:rng(2,5)});
  if(brick.type==='lucky')G.luckyPending=true;
}
const BRICK_TYPES={normal:{},gold:{isGold:true},lucky:{isLucky:true},move:{},double:{},mystery:{},strip:{},tri:{}};

function update(){
  if(G.phase!=='playing')return;
  const spd=G.speedMultiplier||1;
  for(const ball of G.balls){
    if(!ball.active)continue;
    ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>8)ball.trail.shift();
    ball.x+=ball.vx*spd;ball.y+=ball.vy*spd;
    if(ball.x-ball.r<boardLeft){ball.x=boardLeft+ball.r;ball.vx=Math.abs(ball.vx);}
    if(ball.x+ball.r>boardRight){ball.x=boardRight-ball.r;ball.vx=-Math.abs(ball.vx);}
    if(ball.y-ball.r<boardTop){ball.y=boardTop+ball.r;ball.vy=Math.abs(ball.vy);}
    if(ball.y-ball.r>boardBottom+80){ball.active=false;G.roundBallsLost=G.roundBallsLost||0;G.roundBallsLost++;continue;}
    for(const brick of G.bricks){
      if(!brick.visible)continue;
      const rr=getBrickRect(brick);
      if(rectCircle(rr.x,rr.y,rr.w,rr.h,ball.x,ball.y,ball.r)){
        const cx=rr.x+rr.w/2,cy=rr.y+rr.h/2,dx=ball.x-cx,dy=ball.y-cy;
        if(Math.abs(dx)*rr.h>Math.abs(dy)*rr.w)ball.vx=Math.abs(ball.vx)*(dx>0?1:-1);
        else ball.vy=Math.abs(ball.vy)*(dy>0?1:-1);
        if(ball.vy>0)ball.y=rr.y-ball.r;else ball.y=rr.y+rr.h+ball.r;
        if(ball.vx>0)ball.x=rr.x-ball.r;else ball.x=rr.x+rr.w+ball.r;
        hitBrick(brick,ball);break;
      }
    }
    const speed=Math.hypot(ball.vx,ball.vy);
    if(speed>20){ball.vx*=20/speed;ball.vy*=20/speed;}
    if(speed<3){ball.vx*=3/speed;ball.vy*=3/speed;}
  }
  G.balls=G.balls.filter(b=>b.active);
  for(const b of G.bricks){
    if(!b.visible||!b.moveTimer)continue;
    b.moveTimer--;if(b.moveTimer<=0){const d=rng(0,1)?1:-1;const nc=b.col+d;if(nc>=0&&nc<COLS&&!brickAt(b.row,nc))b.col=nc;b.moveTimer=rng(60,180);}
  }
  for(const p of G.particles){p.x+=p.vx;p.y+=p.vy;p.life--;p.vy+=0.1;}
  G.particles=G.particles.filter(p=>p.life>0);
  if(G.balls.length===0&&G.ballsInRound<=0&&!G.launching)checkRoundEnd();
}

function checkRoundEnd(){
  const vis=G.bricks.filter(b=>b.visible);
  if(vis.length===0){
    G.layer++;if(G.layer>G.maxLayer)G.maxLayer=G.layer;
    if(G.score>G.maxScore)G.maxScore=G.score;
    G.combo=0;G.ballsInRound+=3+Math.floor(G.layer/5);
    if(G.luckyPending||G.layer%3===0)G.luckyPending=true;
    showToast('🎉 第'+(G.layer-1)+'层清除！','');
    if(G.luckyPending){showWheel();}else nextLayer();
    save();
  }else if(G.ballsInRound<=0){gameOver();}
}
function gameOver(){
  G.phase='gameover';if(G.score>G.maxScore)G.maxScore=G.score;if(G.layer>G.maxLayer)G.maxLayer=G.layer;
  save();showGameOver();
}
function nextLayer(){
  G.bricks=generateLayer(G.layer);
  const role=ROLES[G.activeRole];let base=8+Math.floor(G.layer/3);
  if(role.skill==='plus5')base+=5;if(role.skill==='plus10')base+=10;
  G.ballsInRound=Math.min(base,50);G.totalBallsLaunched=0;
  G.balls=[];G.combo=0;G.eyeActive=false;G.luckyPending=false;G.phase='playing';updateUI();
}
function revive(){
  G.phase='playing';const role=ROLES[G.activeRole];let base=6+Math.floor(G.layer/4);
  if(role.skill==='plus5')base+=5;if(role.skill==='plus10')base+=10;
  G.ballsInRound=Math.min(Math.max(base,5),50);G.totalBallsLaunched=0;
  G.balls=[];G.combo=0;updateUI();
}

// ──── Items ────
function useHammer(){
  if(G.phase!=='playing')return;
  if(G.hammerCount<=0){showToast('💰 没有钱坤一击！','warn');return;}
  if(G.hammerMode){G.hammerMode=false;updateUI();return;}
  G.hammerMode=true;showToast('🔨 点击砖块消除！','');
}
function hammerHit(brick){
  G.hammerMode=false;G.hammerCount--;brick.hits=0;destroyBrick(brick);
  showToast('💥 钱坤一击！','');updateUI();
  setTimeout(()=>{if(G.bricks.filter(b=>b.visible).length===0)checkRoundEnd();},300);
}
function useEye(){
  if(G.phase!=='playing')return;
  if(G.eyeCount<=0){showToast('💰 没有透视之眼！','warn');return;}
  G.eyeCount--;G.eyeActive=true;showToast('👁️ 已显示隐藏数字！','');updateUI();
}

// ──── Lucky Wheel ────
function spinWheel(){
  if(G.phase!=='playing')return;
  if(G.wheelSpins>=2&&G.gold<30){showToast('💰 需30金币','warn');return;}
  if(G.wheelSpins>=2)G.gold-=30;G.wheelSpins++;
  G.luckyPending=true;showWheel();
}
function showWheel(){
  G.phase='wheel';G.luckyResult=pick(LUCKY_RESULTS);
  const r=G.luckyResult,c=r.good?'var(--green)':'var(--pink)';
  let extra='';
  if(r.item==='hammer')extra='<p style="font-size:0.8rem;color:var(--text-dim);">🔨 +'+r.amount+' 个钱坤一击</p>';
  if(r.item==='eye')extra='<p style="font-size:0.8rem;color:var(--text-dim);">👁️ +'+r.amount+' 个透视之眼</p>';
  if(r.gold)extra='<p style="font-size:0.8rem;color:var(--gold);">💰 +'+r.gold+' 金币</p>';
  showModal('<h2>🎰 幸运轮盘</h2><div style="text-align:center;font-size:4rem;margin:10px;">🎡</div><div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;border-left:4px solid '+c+';margin:8px 0;"><b>'+r.text+'</b>'+extra+'</div><div class="acts"><button class="btn-p" onclick="applyLucky()">✓ 确定</button></div>');
}
function applyLucky(){
  const r=G.luckyResult;if(!r){closeModal();nextLayer();return;}
  if(r.item==='hammer')G.hammerCount+=r.amount;
  if(r.item==='eye')G.eyeCount+=r.amount;
  if(r.gold)G.gold+=r.gold;
  if(r.text.includes('减少10个'))G.ballsInRound=Math.max(1,G.ballsInRound-10);
  if(r.text.includes('增加10个'))G.ballsInRound+=10;
  if(r.text.includes('全部球变为暴击球'))G.totalBallsLaunched=999;
  if(r.text.includes('一半球变为暴击球'))for(let i=0;i<G.balls.length/2;i++)G.balls[i].isCrit=true;
  if(r.text.includes('数字隐藏'))for(const b of G.bricks)b.hidden=true;
  if(r.text.includes('数字翻倍')){const t=G.bricks.filter(b=>b.visible).sort(()=>Math.random()-0.5).slice(0,3);t.forEach(b=>{b.hits*=2;b.maxHits*=2;});}
  if(r.text.includes('数字减半')){const t=G.bricks.filter(b=>b.visible).sort(()=>Math.random()-0.5).slice(0,3);t.forEach(b=>b.hits=Math.max(1,Math.floor(b.hits/2)));}
  if(r.text.includes('层数+1'))G.layer++;
  if(r.text.includes('随机换一种弹球'))G.activeBall=pick(BALLS.filter(b=>G.unlocks.balls.includes(b.id))).id;
  closeModal();nextLayer();
}

// ──── Modals ────
function showModal(html){
  closeModal();
  const o=document.createElement('div');o.className='modal-overlay';o.id='modal-overlay';
  o.innerHTML='<div class="modal">'+html+'</div>';document.body.appendChild(o);
  o.addEventListener('click',e=>{if(e.target===o)closeModal();});
}
function closeModal(){const m=document.getElementById('modal-overlay');if(m)m.remove();}
function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);
}

}
function showShop(){
  showModal('<h2>🏪 道具商店</h2><p style="text-align:center;font-size:0.8rem;color:var(--text-dim);">💰 '+G.gold+' 金币</p><div style="background:var(--surface2);border-radius:10px;padding:10px;margin:6px 0;display:flex;align-items:center;justify-content:space-between;"><div><span style="font-size:1.5rem;">🔨</span> <b>钱坤一击</b><br><small style="color:var(--text-dim);">消除任意砖块</small></div><button class="btn-g" onclick="buyItem(\'hammerCount\',20)">💰20</button></div><div style="background:var(--surface2);border-radius:10px;padding:10px;margin:6px 0;display:flex;align-items:center;justify-content:space-between;"><div><span style="font-size:1.5rem;">👁️</span> <b>透视之眼</b><br><small style="color:var(--text-dim);">显示隐藏数字</small></div><button class="btn-g" onclick="buyItem(\'eyeCount\',15)">💰15</button></div><div class="acts"><button onclick="closeModal()">关闭</button></div>');
}
function buyItem(field,cost){if(G.gold<cost){showToast('💰 金币不足！','warn');return;}G.gold-=cost;G[field]++;showToast('✅ 购买成功！','');save();closeModal();updateUI();}
function showRoleSelect(){
  showModal('<h2>👤 角色</h2><div class="sel-grid">'+ROLES.map(r=>{const u=G.unlocks.roles.includes(r.id),on=G.activeRole===r.id;return'<div class="sel-card'+(on?' on':'')+(u?'':' lock')+'" onclick="'+(u?'selectRole('+r.id+')':'unlockRole('+r.id+')')+'"><span class="em">'+r.emoji+'</span><div>'+r.name+'</div><div style="font-size:0.65rem;color:var(--text-dim);">'+r.desc+'</div>'+(on?'<div style="color:var(--green);font-size:0.6rem;">✅</div>':'')+'</div>';}).join('')+'</div><div class="acts"><button onclick="closeModal()">关闭</button></div>');
}
function selectRole(id){G.activeRole=id;save();closeModal();}
function unlockRole(id){const r=ROLES[id];if(G.gold>=r.cost){G.gold-=r.cost;G.unlocks.roles.push(id);save();showToast('✅ 解锁：'+r.name,'');closeModal();}else{showToast('💰 需'+r.cost+'金币','warn');}}
function showBallSelect(){
  showModal('<h2>⚽ 弹球</h2><div class="sel-grid">'+BALLS.map(b=>{const u=G.unlocks.balls.includes(b.id),on=G.activeBall===b.id;return'<div class="sel-card'+(on?' on':'')+(u?'':' lock')+'" onclick="'+(u?'selectBall('+b.id+')':'unlockBall('+b.id+')')+'"><span class="em" style="color:'+b.color+'">●</span><div style="font-size:0.7rem;">'+b.name+'</div>'+'</div>';}).join('')+'</div><div class="acts"><button onclick="closeModal()">关闭</button></div>');
}
function selectBall(id){G.activeBall=id;save();closeModal();}
function unlockBall(id){const cost=50+(id-101)*10;if(G.gold>=cost){G.gold-=cost;G.unlocks.balls.push(id);save();G.activeBall=id;showToast('✅ 解锁！','');closeModal();}else{showToast('💰 需'+cost+'金币','warn');}}

  showModal('<h2>🎱 波沐弹球</h2><p style="text-align:center;font-size:0.75rem;color:var(--text-dim);">Bomu Pinball · 波沐游戏出品</p><div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;margin:10px 0;"><div style="display:flex;justify-content:space-around;font-size:0.78rem;"><div>🏆层<b>'+G.maxLayer+'</b></div><div>⭐<b>'+G.maxScore+'</b></div><div>💰<b>'+G.gold+'</b></div></div></div><div style="display:flex;flex-direction:column;gap:6px;"><button class="btn-p" onclick="startRound();closeModal();">▶️ 开始游戏</button><button onclick="closeModal();showRoleSelect();">👤 角色</button><button onclick="closeModal();showBallSelect();">⚽ 弹球</button><button class="btn-g" onclick="closeModal();showShop();">🏪 商店</button></div><div class="acts"><button onclick="closeModal();goNav();">← 返回导航</button></div>');

function startRound(){
  G.phase='playing';G.layer=1;G.score=0;G.combo=0;G.wheelSpins=0;G.luckyPending=false;G.hammerMode=false;G.eyeActive=false;
  const role=ROLES[G.activeRole];let base=10;
  if(role.skill==='plus5')base+=5;if(role.skill==='plus10')base+=10;
  G.ballsInRound=base;G.totalBallsLaunched=0;G.balls=[];G.bricks=generateLayer(G.layer);updateUI();
}
function restartGame(){startRound();}
function goMenu(){G.phase='menu';G.balls=[];G.hammerMode=false;updateUI();showMenu();}
function goNav(){save();window.location.href='index.html';}

// ──── Render ────
function render(){
  ctx.clearRect(0,0,cw,ch);
  // BG
  ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,cw,ch);
  ctx.fillStyle='rgba(20,20,40,0.5)';ctx.beginPath();ctx.roundRect(boardLeft-3,boardTop-3,boardRight-boardLeft+6,boardBottom-boardTop+6,6);ctx.fill();
  ctx.strokeStyle='#282850';ctx.lineWidth=1;ctx.stroke();

  // Bricks with real sprites
  for(const brick of G.bricks){
    if(!brick.visible)continue;
    const r=getBrickRect(brick);
    const showNum=G.eyeActive||!brick.hidden;

    // Choose sprite
    let spriteKey='play_brick_normal.png';
    let hitKey='play_brick_normal_hit.png';
    const hitRatio=brick.hits/brick.maxHits;
    const useHit=hitRatio<=0.5;

    switch(brick.type){
      case'gold':spriteKey=useHit?'play_brick_gold_hit.png':'play_brick_gold.png';break;
      case'lucky':spriteKey=useHit?'play_brick_lucky_hit.png':'play_brick_lucky_hit.png';break;
      case'move':spriteKey=useHit?'play_brick_move_hit.png':'play_brick_move.png';break;
      case'double':spriteKey=useHit?'play_brick_double_hit.png':'play_brick_double.png';break;
      case'mystery':spriteKey=showNum?'play_brick_normal.png':'play_brick_lucky.png';break;
      case'strip':spriteKey=useHit?'play_brick_strip_hit.png':'play_brick_strip.png';break;
      case'tri':
        switch(brick.triDir){
          case'upl':spriteKey=useHit?'play_brick_triangle_upl_hit.png':'play_brick_triangle_upl.png';break;
          case'upr':spriteKey=useHit?'play_brick_triangle_upr_hit.png':'play_brick_triangle_upr.png';break;
          case'lowl':spriteKey=useHit?'play_brick_triangle_lowl_hit.png':'play_brick_triangle_lowl.png';break;
          case'lowr':spriteKey=useHit?'play_brick_triangle_lowr_hit.png':'play_brick_triangle_lowr.png';break;
        }break;
    }

    // Draw sprite
    const f=getFrame('game_obj',spriteKey);
    if(f){
      // Scale sprite to fit brick cell
      const pad=2;
      ctx.drawImage(IMG['game_obj'],f.x,f.y,f.w,f.h,r.x+pad,r.y+pad,r.w-pad*2,r.h-pad*2);
    } else {
      // Fallback: colored rectangle
      ctx.fillStyle='#3d3d60';ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,3);ctx.fill();
    }

    // Number
    if(showNum&&brick.hits>0){
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.font='bold '+Math.max(11,brickH*0.42)+'px Inter,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(brick.hits,r.x+r.w/2+1,r.y+r.h/2+1);
      ctx.fillStyle='#fff';ctx.fillText(brick.hits,r.x+r.w/2,r.y+r.h/2);
    }else if(!showNum){
      ctx.fillStyle='#fff';ctx.font='bold '+Math.max(12,brickH*0.48)+'px Inter,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',r.x+r.w/2,r.y+r.h/2);
    }
  }

  // Launch area - draw floor
  const lx=cw/2,ly=boardBottom+30;
  if(!drawSprite(ctx,'game_obj','play_floor_ch.png',lx-40,ly-10,80,40)){
    ctx.fillStyle='#3d3d60';ctx.beginPath();ctx.ellipse(lx,ly+10,35,12,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#7c5cfc';ctx.lineWidth=2;ctx.stroke();
  }

  // Aim line
  if(G.aimStart&&G.aimCurrent&&G.phase==='playing'){
    const dx=G.aimStart.x-G.aimCurrent.x,dy=G.aimStart.y-G.aimCurrent.y;
    const power=Math.min(Math.hypot(dx,dy)/5,18),angle=Math.atan2(dy,dx);
    ctx.strokeStyle='rgba(124,92,252,0.6)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+Math.cos(angle)*(120+power*15),ly+Math.sin(angle)*(120+power*15));ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(lx,ly,10+power*2,0,Math.PI*2);
    ctx.strokeStyle='rgba('+Math.floor(255*power/18)+','+Math.floor(255*(1-power/18))+',92,0.8)';ctx.lineWidth=2;ctx.stroke();
  }

  // Balls
  for(const ball of G.balls){
    if(!ball.active)continue;
    // Trail
    if(ball.trail.length>1){
      ctx.strokeStyle=ball.isCrit?'rgba(255,71,87,0.3)':'rgba(255,255,255,0.12)';
      ctx.lineWidth=ball.r;ctx.beginPath();ctx.moveTo(ball.trail[0].x,ball.trail[0].y);
      for(let i=1;i<ball.trail.length;i++)ctx.lineTo(ball.trail[i].x,ball.trail[i].y);
      ctx.lineTo(ball.x,ball.y);ctx.stroke();
    }
    // Ball
    const bd=BALLS.find(b=>b.id===G.activeBall)||BALLS[0];
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    const grad=ctx.createRadialGradient(ball.x-ball.r*0.3,ball.y-ball.r*0.3,ball.r*0.1,ball.x,ball.y,ball.r);
    grad.addColorStop(0,ball.isCrit?'#ff6b81':'#fff');grad.addColorStop(1,ball.isCrit?'#ff1744':bd.color);
    ctx.fillStyle=grad;ctx.fill();
    if(ball.isCrit){
      ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r+3,0,Math.PI*2);
      ctx.strokeStyle='#ff4757';ctx.lineWidth=1.5;ctx.globalAlpha=0.6+Math.sin(Date.now()/100)*0.4;ctx.stroke();ctx.globalAlpha=1;
    }
  }

  // Particles
  for(const p of G.particles){ctx.fillStyle=p.color;ctx.globalAlpha=p.life/35;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // Hammer mode rect
  if(G.hammerMode){
    ctx.strokeStyle='#ffd700';ctx.lineWidth=3;ctx.setLineDash([8,4]);
    ctx.strokeRect(boardLeft-2,boardTop-2,boardRight-boardLeft+4,boardBottom-boardTop+4);
    ctx.setLineDash([]);ctx.fillStyle='#ffd700';ctx.font='bold 13px Inter';ctx.textAlign='center';ctx.fillText('🔨 点击砖块消除',cw/2,boardTop-10);
  }
}

function updateUI(){
  document.getElementById('s-layer').textContent=G.layer;
  document.getElementById('s-balls').textContent=G.ballsInRound+G.balls.filter(b=>b.active).length;
  document.getElementById('s-gold').textContent=G.gold;
  document.getElementById('s-combo').textContent=G.combo||1;
  document.getElementById('cnt-hammer').textContent=G.hammerCount;
  document.getElementById('cnt-eye').textContent=G.eyeCount;
  document.getElementById('btn-launch').disabled=G.phase!=='playing'||G.ballsInRound<=0;
  document.getElementById('btn-recall').disabled=G.phase!=='playing'||G.balls.filter(b=>b.active).length===0;
}

// ──── roundRect polyfill ────
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();};}

// ──── Main Loop ────
let lastTime=0;
function gameLoop(t){
  if(!lastTime)lastTime=t;
  resize();update();render();updateUI();
  requestAnimationFrame(gameLoop);
}

// ──── Init ────
async function init(){
  G=createGame();
  resize();
  // Show loading
  ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,cw,ch);
  ctx.fillStyle='var(--text-dim)';ctx.font='18px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('加载素材中...',cw/2,ch/2);

  try{
    await loadAllAssets();
    console.log('Assets loaded');
    showMenu();
    requestAnimationFrame(gameLoop);
  }catch(e){
    console.error('Load error:',e);
    ctx.fillText('加载失败，请刷新页面',cw/2,ch/2+30);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(G.hammerMode){G.hammerMode=false;updateUI();showToast('已取消');return;}if(document.getElementById('modal-overlay')){closeModal();return;}}
  if(e.key===' '&&G.phase==='playing'){e.preventDefault();launchAll();}
  if(e.key==='h'&&G.phase==='playing')useHammer();
  if(e.key==='e'&&G.phase==='playing')useEye();
});

init();
</script>
