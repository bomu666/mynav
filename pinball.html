<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>波沐弹球 — Bomu Pinball</title>
<meta name="description" content="波沐游戏出品 — 数字砖块弹球，瞄准发射，消除砖块，层层挑战！">
<style>
/* ===== Theme (MyNav) ===== */
:root {
  --bg: #0a0a14; --surface: #141428; --surface2: #1e1e3a;
  --border: #282850; --text: #e4e4f0; --text-dim: #8080a8;
  --primary: #7c5cfc; --primary-glow: rgba(124,92,252,0.25);
  --green: #00d69c; --blue: #54a0ff; --orange: #ff9f43;
  --pink: #ff6b81; --cyan: #00d2d3; --yellow: #feca57; --red: #ff4757;
  --radius: 14px; --transition: 0.2s ease;
  --gold: #ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg); color: var(--text); overflow: hidden;
  height: 100vh; height: 100dvh; width: 100vw;
  display: flex; flex-direction: column; align-items: center;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% -10%, var(--primary-glow), transparent),
    radial-gradient(ellipse 50% 30% at 85% 90%, rgba(0,210,156,0.06), transparent);
  touch-action: none; user-select: none; -webkit-user-select: none;
}

/* ===== Game Container ===== */
#game-wrap {
  position: relative; width: 100%; max-width: 480px; height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
}
#top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; gap: 8px; flex-shrink: 0;
}
#top-bar .logo {
  font-size: 1.1rem; font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#top-bar .btn {
  padding: 5px 14px; border-radius: 16px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 0.78rem; transition: all var(--transition); white-space: nowrap;
  font-family: inherit;
}
#top-bar .btn:hover { border-color: var(--primary); }

#stats-row {
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
  padding: 4px 8px; font-size: 0.75rem; color: var(--text-dim); flex-shrink: 0;
}
#stats-row span { background: var(--surface2); padding: 3px 10px; border-radius: 10px; }
#stats-row .gold { color: var(--gold); }
#stats-row .combo { color: var(--orange); }
#stats-row .crit { color: var(--red); }

/* Canvas */
#cvs-wrap { flex: 1; position: relative; min-height: 0; }
canvas { display: block; width: 100%; height: 100%; }

/* Bottom action bar */
#action-bar {
  display: flex; gap: 8px; padding: 8px; justify-content: center;
  flex-wrap: wrap; flex-shrink: 0;
}
#action-bar .btn {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 0.8rem; font-weight: 600; transition: all var(--transition);
  font-family: inherit; white-space: nowrap;
}
#action-bar .btn:hover { border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); }
#action-bar .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
#action-bar .btn.gold { background: var(--gold); color: #000; border-color: var(--gold); }
#action-bar .btn:disabled { opacity: 0.4; pointer-events: none; }

/* Aim hint */
#aim-hint {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  color: var(--text-dim); font-size: 0.8rem; pointer-events: none;
  transition: opacity 0.3s; text-align: center;
}

/* Modals */
.modal-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; width: 90%; max-width: 400px;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  animation: slideUp 0.25s;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h2 { font-size: 1.15rem; margin-bottom: 12px; text-align: center; }
.modal .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
.modal .btn {
  padding: 9px 20px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 0.85rem; font-weight: 600; transition: all var(--transition);
  font-family: inherit;
}
.modal .btn:hover { border-color: var(--primary); }
.modal .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.modal .btn.gold { background: var(--gold); color: #000; border-color: var(--gold); }

/* Character / Ball select grid */
.sel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
.sel-card {
  background: var(--surface2); border: 2px solid var(--border); border-radius: 10px;
  padding: 10px; cursor: pointer; transition: all var(--transition); text-align: center;
}
.sel-card:hover { border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); transform: translateY(-1px); }
.sel-card.active { border-color: var(--primary); background: rgba(124,92,252,0.15); }
.sel-card .emoji { font-size: 2rem; display: block; }
.sel-card .name { font-weight: 700; font-size: 0.85rem; }
.sel-card .desc { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
.sel-card .stat { font-size: 0.7rem; color: var(--green); }
.sel-card.locked { opacity: 0.5; pointer-events: none; }
.sel-card.locked .emoji { filter: grayscale(1); }

/* Wheel */
.wheel-slice { transition: fill 0.1s; }

/* Toast */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 200;
  background: var(--green); color: #000; padding: 8px 20px; border-radius: 20px;
  font-weight: 700; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.warn { background: var(--orange); }

/* Card detail (used in modals) */
.card-detail { background: var(--surface2); border-radius: 10px; padding: 12px; margin: 6px 0; }

/* Hidden */
.hidden { display: none !important; }

/* Responsive */
@media(max-width:400px) {
  #top-bar .logo { font-size: 0.95rem; }
  #action-bar .btn { padding: 6px 12px; font-size: 0.72rem; }
}
</style>

<script>

// ──── roundRect polyfill ────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    if (typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
    this.moveTo(x+r.tl,y);
    this.lineTo(x+w-r.tr,y); this.quadraticCurveTo(x+w,y,x+w,y+r.tr);
    this.lineTo(x+w,y+h-r.br); this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
    this.lineTo(x+r.bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r.bl);
    this.lineTo(x,y+r.tl); this.quadraticCurveTo(x,y,x+r.tl,y);
    this.closePath();
  };
}

// ──── Audio ────

function preloadAudio(name, url) {

// ──── Config ────

const BALLS = [

const BRICK_TYPES = {
  normal:  { name:'普通', weight:60, minHits:1, maxHits:15 },
  gold:    { name:'金币', weight:12, minHits:1, maxHits:5, isGold:true },

const LUCKY_RESULTS = [
  { text:'下一回合随机换一种弹球', good:true },
  { text:'白来一趟，什么都没有！', good:false },
  { text:'所有砖块数字隐藏！', good:false },
  { text:'下一回合砖块层数+1！', good:false },

  { text:'一半球变为暴击球！', good:true },
  { text:'全部球变为暴击球！', good:true },
  { text:'获得1个钱坤一击！', good:true, item:'hammer', amount:1 },
  { text:'获得2个透视之眼！', good:true, item:'eye', amount:2 },
  { text:'获得1个透视之眼！', good:true, item:'eye', amount:1 },
  { text:'获得2个钱坤一击！', good:true, item:'hammer', amount:2 },
  { text:'获得20个金币！', good:true, gold:20 },
  { text:'获得50个金币！', good:true, gold:50 },
  { text:'看一个小广告（免费复活机会）', good:false, freeRevive:true },

// ──── Game State ────
let G = null;

function createGame() {
  return {
    phase: 'menu',      // menu | playing | wheel | gameover | revive
    layer: 1,
    balls: [],
    bricks: [],
    gold: 0,
    score: 0,
    combo: 0,
    maxCombo: 0,
    maxLayer: 1,
    maxScore: 0,
    // Launch state
    aimStart: null,
    aimCurrent: null,
    launching: false,
    launchQueue: [],
    // Character & ball
    activeRole: 0,
    activeBall: 101,
    ballsInRound: 10,   // how many balls available this round
    totalBallsLaunched: 0,
    // Items
    hammerCount: 0,
    eyeCount: 0,
    eyeActive: false,   // currently showing hidden numbers
    hammerMode: false,  // waiting to select brick
    // Lucky wheel
    wheelSpins: 0,
    luckyPending: false,
    luckyResult: null,
    // Round tracking
    roundBallsLost: 0,
    brickUnlocks: JSON.parse(localStorage.getItem('bomu_unlocks') || '{"roles":[0],"balls":[101]}'),
    // Effects
    particles: [],
    shakeTimer: 0,
    speedMultiplier: 2,  // 速度倍率，默认2倍速

  };
}

function saveProgress() {
  const data = { maxLayer: G.maxLayer, maxScore: G.maxScore, gold: G.gold, unlocks: G.brickUnlocks };
  localStorage.setItem('bomu_save', JSON.stringify(data));
}

function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem('bomu_save') || '{}');
    if (data.maxLayer) G.maxLayer = data.maxLayer;
    if (data.maxScore) G.maxScore = data.maxScore;
    if (data.gold) G.gold = data.gold;
    if (data.unlocks) G.brickUnlocks = data.unlocks;
  } catch(e) {}
}

function saveUnlocks() {
  localStorage.setItem('bomu_unlocks', JSON.stringify(G.brickUnlocks));
}

// ──── Helpers ────
function rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function rngFloat(min, max) { return Math.random() * (max - min) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function weightedPick(items, weightKey) {
  const total = items.reduce((s, i) => s + i[weightKey], 0);
  let r = Math.random() * total;
  for (const item of items) { r -= item[weightKey]; if (r <= 0) return item; }
  return items[items.length - 1];
}

// ──── Brick Generation ────
function generateLayer(layerNum) {
  const bricks = [];
  const difficulty = Math.min(1 + layerNum * 0.15, 4); // scales 1-4
  const numBricks = COLS * Math.min(ROWS, 2 + Math.floor(layerNum / 2));

  // Generate positions
  const positions = [];
  const rowsUsed = Math.ceil(numBricks / COLS);
  for (let r = 0; r < rowsUsed; r++) {
    for (let c = 0; c < COLS; c++) {
      if (positions.length >= numBricks) break;
      positions.push({ row: r, col: c });
    }
  }

  for (const pos of positions) {
    const type = weightedPick(
      Object.entries(BRICK_TYPES).map(([k, v]) => ({ key: k, ...v })),
      'weight'
    );
    let hits = rng(type.minHits, Math.min(type.maxHits, Math.floor(type.maxHits * difficulty)));
    // Gold bricks have fewer hits but are rarer
    if (type.isGold) hits = rng(1, Math.min(3, Math.floor(3 * difficulty)));
    // Lucky bricks always 1 hit
    if (type.isLucky) hits = 1;

    bricks.push({
      id: Date.now() + Math.random(),
      row: pos.row, col: pos.col,
      type: type.key,
      hits: hits,
      maxHits: hits,
      visible: true,
      hidden: type.isMystery,
      moveTimer: type.isMove ? rng(60, 180) : 0,
    });
  }
  return bricks;
}

function generateBrickTier(layerNum) {
  // Higher layers have more higher-numbered bricks
  const difficulty = Math.min(1 + layerNum * 0.12, 3.5);
  return { difficulty };
}

// ──── Canvas Setup ────
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let cw, ch, brickW, brickH, brickGap, boardTop, boardBottom, boardLeft, boardRight;

function resize() {
  const wrap = document.getElementById('cvs-wrap');
  cw = wrap.clientWidth;
  ch = wrap.clientHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cvs.width = cw * dpr;
  cvs.height = ch * dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  // Layout
  const margin = 12;
  boardLeft = margin;
  boardRight = cw - margin;
  boardTop = margin + 10;
  boardBottom = ch - 140; // leave space for launch area
  brickGap = 4;
  brickW = (boardRight - boardLeft - (COLS - 1) * brickGap) / COLS;
  brickH = Math.min(brickW * 0.8, (boardBottom - boardTop) / 12);
}
window.addEventListener('resize', resize);

// ──── Input Handling ────
function getPos(e) {
  const rect = cvs.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

cvs.addEventListener('pointerdown', (e) => {
  if (G.phase !== 'playing') return;
  if (G.hammerMode) {
    const pos = getPos(e);
    const brick = hitTestBrick(pos);
    if (brick) { hammerHit(brick); }
    return;
  }
  // Start aiming
  G.aimStart = getPos(e);
  G.aimCurrent = G.aimStart;
  document.getElementById('aim-hint').style.opacity = '0';
});

cvs.addEventListener('pointermove', (e) => {
  if (G.phase !== 'playing') return;
  if (G.aimStart && !G.launching) {
    G.aimCurrent = getPos(e);
    // Clamp aim direction (must aim upward)
    const dy = G.aimCurrent.y - G.aimStart.y;
    if (dy > 0) G.aimCurrent.y = G.aimStart.y;
  }
});

cvs.addEventListener('pointerup', (e) => {
  if (G.phase !== 'playing') return;
  if (G.aimStart && G.aimCurrent && !G.launching) {
    const dx = G.aimStart.x - G.aimCurrent.x;
    const dy = G.aimStart.y - G.aimCurrent.y;
    const power = Math.min(Math.hypot(dx, dy) / 5, 18);
    const angle = Math.atan2(dy, dx);
    if (power > 2 && dy > 5) { // must drag upward with some force
      launchBall(angle, power);
    }
    G.aimStart = null;
    G.aimCurrent = null;
  }
});

// ──── Ball Physics ────
function spawnBall(angle, power, isCrit = false) {
  const sx = cw / 2;
  const sy = boardBottom + 30;
  const vx = Math.cos(angle) * power;
  const vy = Math.sin(angle) * power; // negative = upward
  return {
    x: sx, y: sy, vx, vy,
    r: brickW * 0.22,
    active: true,
    isCrit,
    trail: [],
    bounced: 0,
  };
}

function launchBall(angle, power) {
  if (G.ballsInRound <= 0) return;
  const isCrit = G.totalBallsLaunched < getCritCount();
  const ball = spawnBall(angle, power, isCrit);
  G.balls.push(ball);
  G.ballsInRound--;
  G.totalBallsLaunched++;
  playSfx('se_addball', 0.3);
}

function launchAll() {
  if (G.phase !== 'playing' || G.ballsInRound <= 0) return;
  G.launching = true;
  // Auto-launch all remaining balls with fan pattern
  const count = G.ballsInRound;
  const spreadAngle = Math.PI * 0.4; // 72 degree spread
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const frac = count > 1 ? i / (count - 1) : 0.5;
      const angle = -Math.PI / 2 - spreadAngle / 2 + spreadAngle * frac;
      const power = 10 + Math.random() * 4;
      launchBall(angle, power);
    }, i * 40); // faster launch interval
  }
  setTimeout(() => { G.launching = false; }, count * 40 + 100);
}

// ──── Recall All Balls ────
function recallAll() {
  if (G.phase !== 'playing') return;
  const count = G.balls.length;
  if (count === 0) { showToast('没有球在场上了', 'warn'); return; }
  // Return all active balls to the pool
  for (const ball of G.balls) {
    ball.active = false;
  }
  G.balls = [];
  G.ballsInRound += count;
  G.totalBallsLaunched = Math.max(0, G.totalBallsLaunched - count);
  playSfx('se_diaoluo', 0.5);
  showToast(`⬇️ 收回了 ${count} 颗弹球`, '');
  updateUI();
}

// ──── Toggle Speed ────
function toggleSpeed() {
  const speeds = [1, 2, 4, 8];
  const cur = speeds.indexOf(G.speedMultiplier);
  const next = (cur + 1) % speeds.length;
  G.speedMultiplier = speeds[next];
  const labels = {1:'1×', 2:'2×', 4:'4×', 8:'8×'};
  document.getElementById('btn-speed').textContent = '⏩ ' + labels[G.speedMultiplier];
  showToast('⏩ 速度：' + labels[G.speedMultiplier], G.speedMultiplier >= 4 ? 'warn' : '');
}

function getCritCount() {
  const role = ROLES[G.activeRole];
  if (role.skill === 'crit5') return 5;
  if (role.skill === 'crit10') return 10;
  return 0;
}

// ──── Collision Detection ────
function rectCircleCollision(rx, ry, rw, rh, cx, cy, cr) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX, dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

function getBrickRect(brick) {
  const x = boardLeft + brick.col * (brickW + brickGap);
  const y = boardTop + brick.row * (brickH + brickGap);
  return { x, y, w: brickW, h: brickH };
}

function hitTestBrick(pos) {
  for (const brick of G.bricks) {
    if (!brick.visible) continue;
    const r = getBrickRect(brick);
    if (pos.x >= r.x && pos.x <= r.x + r.w && pos.y >= r.y && pos.y <= r.y + r.h) {
      return brick;
    }
  }
  return null;
}

// ──── Game Loop ────
function update() {
  if (G.phase !== 'playing') return;

  // Update balls
  for (const ball of G.balls) {
    if (!ball.active) continue;
    // Store trail
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 8) ball.trail.shift();

    // Move (apply speed multiplier)
    const spd = G.speedMultiplier || 1;
    ball.x += ball.vx * spd;
    ball.y += ball.vy * spd;

    // Wall collisions
    if (ball.x - ball.r < boardLeft) { ball.x = boardLeft + ball.r; ball.vx = Math.abs(ball.vx); playSfx('se_daji', 0.15); }
    if (ball.x + ball.r > boardRight) { ball.x = boardRight - ball.r; ball.vx = -Math.abs(ball.vx); playSfx('se_daji', 0.15); }
    if (ball.y - ball.r < boardTop) { ball.y = boardTop + ball.r; ball.vy = Math.abs(ball.vy); playSfx('se_daji', 0.15); }

    // Bottom (lose ball)
    if (ball.y - ball.r > boardBottom + 80) {
      ball.active = false;
      G.roundBallsLost++;
      playSfx('se_diaoluo', 0.3);
      continue;
    }

    // Brick collisions
    for (const brick of G.bricks) {
      if (!brick.visible) continue;
      const r = getBrickRect(brick);
      if (rectCircleCollision(r.x, r.y, r.w, r.h, ball.x, ball.y, ball.r)) {
        // Determine bounce direction
        const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
        const dx = ball.x - cx, dy = ball.y - cy;
        // Reflect
        if (Math.abs(dx) * r.h > Math.abs(dy) * r.w) {
          ball.vx = Math.abs(ball.vx) * (dx > 0 ? 1 : -1);
        } else {
          ball.vy = Math.abs(ball.vy) * (dy > 0 ? 1 : -1);
        }
        // Push ball out
        if (ball.vy > 0) ball.y = r.y - ball.r;
        else ball.y = r.y + r.h + ball.r;
        if (ball.vx > 0) ball.x = r.x - ball.r;
        else ball.x = r.x + r.w + ball.r;

        // Hit brick
        hitBrick(brick, ball);
        break; // one collision per frame
      }
    }

    // Speed limit (scaled with multiplier)
    const speed = Math.hypot(ball.vx, ball.vy);
    const maxSpd = 20;
    const minSpd = 3;
    if (speed > maxSpd) { ball.vx *= maxSpd / speed; ball.vy *= maxSpd / speed; }
    if (speed < minSpd) { ball.vx *= minSpd / speed; ball.vy *= minSpd / speed; }
  }

  // Clean dead balls
  G.balls = G.balls.filter(b => b.active);

  // Update moving bricks
  for (const brick of G.bricks) {
    if (!brick.visible || !brick.moveTimer) continue;
    brick.moveTimer--;
    if (brick.moveTimer <= 0) {
      // Shift brick position
      const dir = Math.random() > 0.5 ? 1 : -1;
      const newCol = brick.col + dir;
      if (newCol >= 0 && newCol < COLS && !brickAt(brick.row, newCol)) {
        brick.col = newCol;
      }
      brick.moveTimer = rng(60, 180);
    }
  }

  // Update particles
  for (const p of G.particles) {
    p.x += p.vx; p.y += p.vy;
    p.life--; p.vy += 0.1; // gravity
  }
  G.particles = G.particles.filter(p => p.life > 0);

  // Update flashes
  G.flashes = G.flashes.filter(f => { f.life--; return f.life > 0; });

  // Check round end
  if (G.balls.length === 0 && G.ballsInRound <= 0 && !G.launching) {
    checkRoundEnd();
  }
}

function brickAt(row, col) {
  return G.bricks.find(b => b.visible && b.row === row && b.col === col);
}

function hitBrick(brick, ball) {
  const dmg = ball.isCrit ? 2 : 1;
  brick.hits -= dmg;
  G.combo++;

  // Spawn hit particles
  const r = getBrickRect(brick);
  for (let i = 0; i < 5; i++) {
    G.particles.push({
      x: r.x + r.w / 2, y: r.y + r.h / 2,
      vx: rngFloat(-3, 3), vy: rngFloat(-4, -1),
      life: rng(10, 25), color: ball.isCrit ? '#ff4757' : '#ffd700', size: rng(1, 3),
    });
  }

  if (brick.hits <= 0) {
    destroyBrick(brick);
    if (G.combo >= 5) playSfx('se_combo', 0.4);
    if (G.combo >= 10) playSfx('se_combo_gold', 0.5);
  } else {
    playSfx('se_daji', 0.2);
  }
}

function destroyBrick(brick) {
  brick.visible = false;
  const r = getBrickRect(brick);
  const role = ROLES[G.activeRole];

  // Gold reward
  let baseGold = 1;
  if (BRICK_TYPES[brick.type]?.isGold) baseGold = rng(3, 8);
  let goldEarned = baseGold;
  if (role.skill === 'doubleGold') goldEarned *= 2;
  if (role.skill === 'tripleGold') goldEarned *= 3;
  G.gold += goldEarned;

  // Score
  G.score += (brick.maxHits || 1) * 10;

  // Explosion particles
  for (let i = 0; i < 12; i++) {
    G.particles.push({
      x: r.x + r.w / 2, y: r.y + r.h / 2,
      vx: rngFloat(-4, 4), vy: rngFloat(-5, -1),
      life: rng(15, 35),
      color: brick.type === 'gold' ? '#ffd700' : brick.type === 'lucky' ? '#00ff88' : ['#ff6b81','#54a0ff','#7c5cfc','#ff9f43'][rng(0,3)],
      size: rng(2, 5),
    });
  }
  playSfx('se_boom', 0.3);

  // Lucky brick triggers wheel
  if (BRICK_TYPES[brick.type]?.isLucky) {
    G.luckyPending = true;
  }

  // Gold collecting
  if (goldEarned > 0) playSfx('se_addgold', 0.2);
}

function checkRoundEnd() {
  const visibleBricks = G.bricks.filter(b => b.visible);
  if (visibleBricks.length === 0) {
    // Layer cleared!
    G.layer++;
    if (G.layer > G.maxLayer) G.maxLayer = G.layer;
    if (G.score > G.maxScore) G.maxScore = G.score;
    G.combo = 0;
    G.roundBallsLost = 0;
    // Bonus balls for clearing
    const bonus = 3 + Math.floor(G.layer / 5);
    G.ballsInRound += bonus;
    showToast(`🎉 第${G.layer-1}层清除！+${bonus}球`, '');
    // Check lucky wheel
    if (G.luckyPending || G.layer % 3 === 0) {
      G.luckyPending = true;
    }
    // New layer
    if (G.luckyPending) {
      showWheelModal();
    } else {
      nextLayer();
    }
    saveProgress();
  } else if (G.ballsInRound <= 0) {
    // Out of balls — game over
    gameOver();
  }
}

function gameOver() {
  G.phase = 'gameover';
  if (G.score > G.maxScore) G.maxScore = G.score;
  if (G.layer > G.maxLayer) G.maxLayer = G.layer;
  saveProgress();
  showGameOverModal();
}

function nextLayer() {
  G.bricks = generateLayer(G.layer);
  // Refill balls
  const role = ROLES[G.activeRole];
  let baseBalls = 8 + Math.floor(G.layer / 3);
  if (role.skill === 'plus5') baseBalls += 5;
  if (role.skill === 'plus10') baseBalls += 10;
  G.ballsInRound = Math.min(baseBalls, 50);
  G.totalBallsLaunched = 0;
  G.roundBallsLost = 0;
  G.balls = [];
  G.combo = 0;
  G.eyeActive = false;
  G.luckyPending = false;
  G.phase = 'playing';
  updateUI();
}

function revive() {
  G.phase = 'playing';
  const role = ROLES[G.activeRole];
  let baseBalls = 6 + Math.floor(G.layer / 4);
  if (role.skill === 'plus5') baseBalls += 5;
  if (role.skill === 'plus10') baseBalls += 10;
  G.ballsInRound = Math.min(Math.max(baseBalls, 5), 50);
  G.totalBallsLaunched = 0;
  G.roundBallsLost = 0;
  G.balls = [];
  G.combo = 0;
  updateUI();
}

// ──── Items ────
function useHammer() {
  if (G.phase !== 'playing') return;
  if (G.hammerCount <= 0) {
    showToast('💰 没有钱坤一击！去商店购买吧', 'warn');
    return;
  }
  if (G.hammerMode) { G.hammerMode = false; updateUI(); return; }
  G.hammerMode = true;
  showToast('🔨 点击一个砖块来消除它！再按取消', '');
}

function hammerHit(brick) {
  if (!G.hammerMode) return;
  G.hammerMode = false;
  G.hammerCount--;
  brick.hits = 0;
  destroyBrick(brick);
  playSfx('se_chuizi', 0.6);
  showToast('💥 钱坤一击！', '');
  updateUI();
  // Check if round clear
  setTimeout(() => {
    if (G.bricks.filter(b => b.visible).length === 0) checkRoundEnd();
  }, 300);
}

function useEye() {
  if (G.phase !== 'playing') return;
  if (G.eyeCount <= 0) {
    showToast('💰 没有透视之眼！去商店购买吧', 'warn');
    return;
  }
  G.eyeCount--;
  G.eyeActive = true;
  playSfx('se_eye', 0.5);
  showToast('👁️ 已显示所有问号砖块数字！', '');
  updateUI();
}

// ──── Lucky Wheel ────
function spinWheel() {
  if (G.phase !== 'playing') return;
  if (G.wheelSpins >= 2 && G.gold < 30) {
    showToast('💰 需要30金币来再转一次！', 'warn');
    return;
  }
  if (G.wheelSpins >= 2) G.gold -= 30;
  G.wheelSpins++;
  G.luckyPending = true;
  showWheelModal();
}

function showWheelModal() {
  G.phase = 'wheel';
  const result = pick(LUCKY_RESULTS);
  G.luckyResult = result;

  const isGood = result.good;
  const color = isGood ? 'var(--green)' : 'var(--pink)';

  let extraHtml = '';
  if (result.item === 'hammer') extraHtml = `<p style="font-size:0.8rem;color:var(--text-dim);">🔨 +${result.amount} 个钱坤一击</p>`;
  if (result.item === 'eye') extraHtml = `<p style="font-size:0.8rem;color:var(--text-dim);">👁️ +${result.amount} 个透视之眼</p>`;
  if (result.gold) extraHtml = `<p style="font-size:0.8rem;color:var(--gold);">💰 +${result.gold} 金币</p>`;
  if (result.freeRevive) extraHtml = `<p style="font-size:0.8rem;color:var(--text-dim);">📺 获得一次免费复活</p>`;

  showModal(`
    <h2>🎰 幸运轮盘</h2>
    <div style="text-align:center;font-size:4rem;margin:12px 0;animation:spinAnim 0.6s ease-out;">🎡</div>
    <div class="card-detail" style="background:var(--surface2);border-radius:10px;padding:14px;text-align:center;border-left:4px solid ${color};">
      <div style="font-weight:700;font-size:1rem;">${result.text}</div>
      ${extraHtml}
    </div>
    <div class="actions">
      <button class="btn primary" onclick="applyLuckyResult()">✓ 确定</button>
    </div>
  `);
}

function applyLuckyResult() {
  const r = G.luckyResult;
  if (r) {
    if (r.item === 'hammer') G.hammerCount += r.amount;
    if (r.item === 'eye') G.eyeCount += r.amount;
    if (r.gold) G.gold += r.gold;
    if (r.text.includes('弹球减少10个')) G.ballsInRound = Math.max(1, G.ballsInRound - 10);
    if (r.text.includes('弹球增加10个')) G.ballsInRound += 10;
    if (r.text.includes('全部球变为暴击球')) {
      // All remaining balls in this round will be crit
      G.totalBallsLaunched = 999; // hack: ensure all new spawns are crit
    }
    if (r.text.includes('一半球变为暴击球')) {
      for (let i = 0; i < G.balls.length; i++) {
        if (i < G.balls.length / 2) G.balls[i].isCrit = true;
      }
    }
    if (r.text.includes('数字隐藏')) {
      for (const b of G.bricks) b.hidden = true;
    }
    if (r.text.includes('数字翻倍')) {
      const targets = G.bricks.filter(b => b.visible).sort(() => Math.random() - 0.5).slice(0, 3);
      targets.forEach(b => { b.hits *= 2; b.maxHits *= 2; });
    }
    if (r.text.includes('数字减半')) {
      const targets = G.bricks.filter(b => b.visible).sort(() => Math.random() - 0.5).slice(0, 3);
      targets.forEach(b => { b.hits = Math.max(1, Math.floor(b.hits / 2)); });
    }
    if (r.text.includes('层数+1')) G.layer++;
    if (r.text.includes('随机换一种弹球')) {
      G.activeBall = pick(BALLS.filter(b => G.brickUnlocks.balls.includes(b.id))).id;
    }
    if (r.freeRevive) {
      // no-op for now, handled in game over
    }
  }
  closeModal();
  nextLayer();
}

// ──── Modals ────
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
}

function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

function selectRole(id) {
  const role = ROLES[id];
  if (!G.brickUnlocks.roles.includes(id)) {
    if (G.gold >= role.cost) {
      G.gold -= role.cost;
      G.brickUnlocks.roles.push(id);
      saveUnlocks();
      showToast(`✅ 解锁角色：${role.name}！`, '');
    } else {
      showToast(`💰 需要 ${role.cost} 金币解锁`, 'warn');
      return;
    }
  }
  G.activeRole = id;
  saveProgress();
  closeModal();
}

    </div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">关闭</button>
    </div>
  `);
}

function selectBall(id) {
  G.activeBall = id;
  saveProgress();
  closeModal();
}

function unlockBall(id) {
  const ball = BALLS.find(b => b.id === id);
  const cost = 50 + (id - 101) * 10; // increasing cost per ball
  if (G.gold >= cost) {
    G.gold -= cost;
    G.brickUnlocks.balls.push(id);
    saveUnlocks();
    G.activeBall = id;
    showToast(`✅ 解锁弹球：${ball.name}！`, '');
    closeModal();
  } else {
    showToast(`💰 需要 ${cost} 金币解锁新弹球`, 'warn');
  }
}

// ──── Menu ────
function showMenu() {
  G.phase = 'menu';
  showModal(`
    <h2>🎱 波沐弹球</h2>
    <p style="text-align:center;font-size:0.8rem;color:var(--text-dim);">Bomu Pinball · 波沐游戏出品</p>
    <div class="card-detail" style="background:var(--surface2);border-radius:10px;padding:14px;text-align:center;margin:12px 0;">
      <div style="display:flex;justify-content:space-around;font-size:0.8rem;">
        <div>🏆 最高层：<b>${G.maxLayer}</b></div>
        <div>⭐ 最高分：<b>${G.maxScore}</b></div>
        <div>💰 金币：<b>${G.gold}</b></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn primary" onclick="startRound();closeModal();">▶️ 开始游戏</button>
      <button class="btn" onclick="closeModal();showRoleSelectModal();">👤 角色选择</button>
      <button class="btn" onclick="closeModal();showBallSelectModal();">⚽ 弹球选择</button>
      <button class="btn gold" onclick="closeModal();showShopModal();">🏪 道具商店</button>
    </div>
    <div class="actions" style="margin-top:8px;">
      <button class="btn" onclick="closeModal();goNav();">← 返回导航</button>
    </div>
  `);
}

function startRound() {
  G.phase = 'playing';
  G.layer = 1;
  G.score = 0;
  G.combo = 0;
  G.maxCombo = 0;
  G.roundBallsLost = 0;
  G.wheelSpins = 0;
  G.luckyPending = false;
  G.hammerMode = false;
  G.eyeActive = false;

  const role = ROLES[G.activeRole];
  let baseBalls = 10;
  if (role.skill === 'plus5') baseBalls += 5;
  if (role.skill === 'plus10') baseBalls += 10;
  G.ballsInRound = baseBalls;
  G.totalBallsLaunched = 0;
  G.balls = [];
  G.bricks = generateLayer(G.layer);
  document.getElementById('aim-hint').style.opacity = '1';
  updateUI();
}

function restartGame() {
  startRound();
}

function goMenu() {
  G.phase = 'menu';
  G.balls = [];
  G.hammerMode = false;
  updateUI();
  showMenu();
}

function goNav() {
  G.phase = 'menu';
  saveProgress();
  window.location.href = 'index.html';
}

// ──── Render ────
function render() {
  ctx.clearRect(0, 0, cw, ch);

  // Background
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, cw, ch);

  // Board area bg
  ctx.fillStyle = 'rgba(20, 20, 40, 0.6)';
  ctx.strokeStyle = 'var(--border)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(boardLeft - 4, boardTop - 4, boardRight - boardLeft + 8, boardBottom - boardTop + 8, 8);
  ctx.fill();
  ctx.strokeStyle = '#282850';
  ctx.stroke();

  // Draw bricks
  for (const brick of G.bricks) {
    if (!brick.visible) continue;
    const r = getBrickRect(brick);
    const showNum = G.eyeActive || !brick.hidden;

    // Brick color by type
    let fill, stroke;
    switch (brick.type) {
      case 'gold': fill = '#ffd700'; stroke = '#cc9900'; break;
      case 'lucky': fill = '#00ff88'; stroke = '#00cc66'; break;
      case 'move': fill = '#54a0ff'; stroke = '#3d7fd9'; break;
      case 'double': fill = '#ff9f43'; stroke = '#cc7f33'; break;
      case 'mystery': fill = showNum ? '#ce93d8' : '#7c5cfc'; stroke = '#8e5cb8'; break;
      default: fill = '#3d3d60'; stroke = '#505080'; break;
    }

    // Draw brick shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(r.x + 2, r.y + 2, r.w, r.h, 4);
    ctx.fill();

    // Draw brick
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(r.x, r.y, r.w, r.h, 4);
    ctx.fill();
    ctx.stroke();

    // Draw number
    if (showNum) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(10, brickH * 0.45)}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const numText = brick.hits > 0 ? brick.hits.toString() : '';
      if (numText) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillText(numText, r.x + r.w / 2 + 1, r.y + r.h / 2 + 1);
        ctx.fillStyle = '#fff';
        ctx.fillText(numText, r.x + r.w / 2, r.y + r.h / 2);
      }
    } else {
      // Question mark
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(12, brickH * 0.5)}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', r.x + r.w / 2, r.y + r.h / 2);
    }

    // Brick type icon (small)
    if (brick.type === 'gold') {
      ctx.font = `${brickH * 0.25}px sans-serif`; ctx.fillText('🪙', r.x + r.w - 8, r.y + 8);
    } else if (brick.type === 'lucky') {
      ctx.font = `${brickH * 0.25}px sans-serif`; ctx.fillText('🍀', r.x + r.w - 8, r.y + 8);
    } else if (brick.type === 'move') {
      ctx.font = `${brickH * 0.25}px sans-serif`; ctx.fillText('↔️', r.x + r.w - 8, r.y + 8);
    }
  }

  // Launch area
  const lx = cw / 2, ly = boardBottom + 30;
  // Paddle/platform
  ctx.fillStyle = '#3d3d60';
  ctx.strokeStyle = '#7c5cfc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(lx, ly + 10, 35, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Aim line
  if (G.aimStart && G.aimCurrent && G.phase === 'playing') {
    const dx = G.aimStart.x - G.aimCurrent.x;
    const dy = G.aimStart.y - G.aimCurrent.y;
    const power = Math.min(Math.hypot(dx, dy) / 5, 18);
    const angle = Math.atan2(dy, dx);

    // Aim indicator line
    ctx.strokeStyle = 'rgba(124, 92, 252, 0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    const lineLen = 120 + power * 15;
    ctx.lineTo(lx + Math.cos(angle) * lineLen, ly + Math.sin(angle) * lineLen);
    ctx.stroke();
    ctx.setLineDash([]);

    // Power ring
    ctx.beginPath();
    ctx.arc(lx, ly, 10 + power * 2, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${Math.floor(255*power/18)}, ${Math.floor(255*(1-power/18))}, 92, 0.8)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Balls
  for (const ball of G.balls) {
    if (!ball.active) continue;

    // Trail
    if (ball.trail.length > 1) {
      ctx.strokeStyle = ball.isCrit ? 'rgba(255, 71, 87, 0.3)' : 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = ball.r;
      ctx.beginPath();
      ctx.moveTo(ball.trail[0].x, ball.trail[0].y);
      for (let i = 1; i < ball.trail.length; i++) ctx.lineTo(ball.trail[i].x, ball.trail[i].y);
      ctx.lineTo(ball.x, ball.y);
      ctx.stroke();
    }

    // Ball body
    const ballData = BALLS.find(b => b.id === G.activeBall) || BALLS[0];
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.1, ball.x, ball.y, ball.r);
    grad.addColorStop(0, ball.isCrit ? '#ff6b81' : '#ffffff');
    grad.addColorStop(1, ball.isCrit ? '#ff1744' : ballData.color);
    ctx.fillStyle = grad;
    ctx.fill();

    if (ball.isCrit) {
      // Crit indicator glow
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r + 3, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff4757';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 100) * 0.4;
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Star symbol
      ctx.fillStyle = '#ff0';
      ctx.font = `${ball.r}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚡', ball.x, ball.y);
    }
  }

  // Particles
  for (const p of G.particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 35;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Hammer mode highlight
  if (G.hammerMode) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]);
    ctx.strokeRect(boardLeft - 2, boardTop - 2, boardRight - boardLeft + 4, boardBottom - boardTop + 4);
    ctx.setLineDash([]);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🔨 点击砖块消除', cw / 2, boardTop - 12);
  }
}

function updateUI() {
  document.getElementById('s-layer').textContent = G.layer;
  document.getElementById('s-balls').textContent = G.ballsInRound + G.balls.length;
  document.getElementById('s-gold').textContent = G.gold;
  document.getElementById('cnt-hammer').textContent = G.hammerCount;
  document.getElementById('cnt-eye').textContent = G.eyeCount;

  const comboEl = document.getElementById('s-combo-el');
  if (G.combo >= 3) { comboEl.style.display = ''; document.getElementById('s-combo').textContent = G.combo; }
  else comboEl.style.display = 'none';

  document.getElementById('btn-hammer').disabled = G.phase !== 'playing';
  document.getElementById('btn-eye').disabled = G.phase !== 'playing';
  document.getElementById('btn-wheel').disabled = G.phase !== 'playing';
  document.getElementById('btn-launch').disabled = G.phase !== 'playing' || G.ballsInRound <= 0;
  document.getElementById('btn-recall').disabled = G.phase !== 'playing' || G.balls.length === 0;
}

// ──── Main Loop ────
function gameLoop() {
  resize();
  update();
  render();
  updateUI();
  requestAnimationFrame(gameLoop);
}

// ──── Init ────
function init() {
  G = createGame();
  loadProgress();
  resize();
  showMenu();
  requestAnimationFrame(gameLoop);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (G.hammerMode) { G.hammerMode = false; updateUI(); showToast('已取消钱坤一击'); return; }
    if (document.getElementById('modal-overlay')) { closeModal(); return; }
  }
  if (e.key === ' ' && G.phase === 'playing') {
    e.preventDefault();
    launchAll();
  }
  if (e.key === 'h' && G.phase === 'playing') useHammer();
  if (e.key === 'e' && G.phase === 'playing') useEye();
  if (e.key === 'w' && G.phase === 'playing') spinWheel();
});

init();
</script>
