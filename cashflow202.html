<style>
/* ===== CSS Variables (matching nav-page theme) ===== */
:root {
  --bg: #0a0a14; --surface: #141428; --surface2: #1e1e3a;
  --border: #282850; --text: #e4e4f0; --text-dim: #8080a8;
  --primary: #7c5cfc; --primary-glow: rgba(124,92,252,0.25);
  --green: #00d69c; --blue: #54a0ff; --orange: #ff9f43;
  --pink: #ff6b81; --cyan: #00d2d3; --yellow: #feca57;
  --red: #ff4757; --radius: 14px; --transition: 0.2s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% -10%, var(--primary-glow), transparent),
    radial-gradient(ellipse 50% 30% at 85% 90%, rgba(0,210,156,0.06), transparent);
  background-attachment: fixed;
  overflow-x: hidden;
}
.container { max-width: 1400px; margin:0 auto; padding:0 20px; }

/* ===== Header ===== */
.game-header {
  text-align:center; padding:20px 0 8px;
}
.game-header h1 {
  font-size:2rem; font-weight:800; letter-spacing:-1px;
  background:linear-gradient(135deg, var(--primary), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.game-header .sub { color:var(--text-dim); font-size:0.85rem; }
.turn-info {
  display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
  margin-top:8px; font-size:0.8rem; color:var(--text-dim);
}
.turn-info span { background:var(--surface2); padding:4px 12px; border-radius:12px; }

/* ===== Main Layout ===== */
.main-layout {
  display:grid; grid-template-columns:1fr 380px; gap:16px;
  margin-top:12px; align-items:start;
}
@media(max-width:900px) { .main-layout { grid-template-columns:1fr; } }

/* ===== Board ===== */
.board-container {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px;
  position:relative; min-height:520px; overflow:hidden;
}
.board-container h3 { text-align:center; color:var(--text-dim); font-size:0.85rem; margin-bottom:8px; }
.board-svg { width:100%; height:480px; display:block; }

/* Space tooltip */
.space-tooltip {
  position:absolute; background:var(--surface2); border:1px solid var(--border);
  padding:8px 14px; border-radius:8px; font-size:0.78rem; pointer-events:none;
  z-index:10; opacity:0; transition:opacity 0.2s; white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
}

/* ===== Player Sheet ===== */
.sheet {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px;
}
.sheet h3 { font-size:0.9rem; margin-bottom:8px; color:var(--text-dim); }
.sheet-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.8rem; border-bottom:1px solid rgba(255,255,255,0.03); }
.sheet-row .val { font-weight:600; }
.sheet-row .pos { color:var(--green); }
.sheet-row .neg { color:var(--pink); }
.sheet-section { margin-bottom:10px; }
.sheet-section h4 { font-size:0.75rem; color:var(--orange); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.sheet-divider { border-top:1px dashed var(--border); margin:8px 0; }
.summary-box {
  background:var(--surface2); border-radius:10px; padding:10px;
  margin-top:8px; text-align:center;
}
.summary-box .big-num { font-size:1.6rem; font-weight:800; }
.summary-box .label { font-size:0.7rem; color:var(--text-dim); }
.progress-bar {
  height:6px; background:var(--surface2); border-radius:3px; margin-top:6px; overflow:hidden;
}
.progress-bar .fill {
  height:100%; background:linear-gradient(90deg, var(--primary), var(--cyan));
  border-radius:3px; transition:width 0.5s;
}

/* ===== Action Bar ===== */
.action-bar {
  display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  margin-top:16px; padding:12px; background:var(--surface); border-radius:var(--radius);
  border:1px solid var(--border);
}
.btn {
  padding:10px 24px; border-radius:22px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); cursor:pointer;
  font-size:0.9rem; font-weight:600; transition:all var(--transition);
  white-space:nowrap;
}
.btn:hover { border-color:var(--primary); box-shadow:0 0 16px var(--primary-glow); }
.btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
.btn.primary:hover { box-shadow:0 0 24px var(--primary-glow); }
.btn.green { background:var(--green); color:#000; border-color:var(--green); }
.btn.red { background:var(--red); color:#fff; border-color:var(--red); }
.btn:disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }

/* ===== Dice ===== */
.dice-box {
  display:flex; gap:12px; align-items:center;
}
.die {
  width:52px; height:52px; background:var(--surface2); border:2px solid var(--border);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; font-weight:800; transition:transform 0.1s;
}
.die.rolling { animation:diceRoll 0.15s infinite; }
@keyframes diceRoll {
  0%{transform:rotate(0deg) scale(1)} 25%{transform:rotate(90deg) scale(1.1)}
  50%{transform:rotate(180deg) scale(1)} 75%{transform:rotate(270deg) scale(1.1)}
  100%{transform:rotate(360deg) scale(1)}
}

/* ===== Event Log ===== */
.event-log {
  max-height:120px; overflow-y:auto; margin-top:10px; font-size:0.75rem;
  background:var(--surface2); border-radius:8px; padding:8px;
}
.event-log .entry { padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-dim); }
.event-log .entry .emoji { margin-right:4px; }

/* ===== Modals ===== */
.modal-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
  z-index:100; display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.2s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:24px; max-width:480px; width:90%;
  max-height:80vh; overflow-y:auto; box-shadow:0 16px 48px rgba(0,0,0,0.6);
  animation:slideUp 0.25s;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h2 { font-size:1.2rem; margin-bottom:12px; }
.card-detail { background:var(--surface2); border-radius:10px; padding:14px; margin:10px 0; }
.card-detail .row { display:flex; justify-content:space-between; padding:3px 0; font-size:0.85rem; }
.modal .actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.modal .actions .btn { flex:1; text-align:center; }

/* Career selection grid */
.career-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px;
}
.career-card {
  background:var(--surface2); border:2px solid var(--border); border-radius:12px;
  padding:14px; cursor:pointer; transition:all var(--transition); text-align:center;
}
.career-card:hover { border-color:var(--primary); box-shadow:0 0 20px var(--primary-glow); transform:translateY(-2px); }
.career-card .c-icon { font-size:2.2rem; display:block; margin-bottom:6px; }
.career-card .c-name { font-weight:700; font-size:0.95rem; }
.career-card .c-salary { color:var(--green); font-size:0.85rem; }
.career-card .c-expense { color:var(--pink); font-size:0.78rem; }

/* Asset list */
.asset-item {
  display:flex; justify-content:space-between; align-items:center;
  background:var(--surface2); border-radius:8px; padding:8px 10px;
  margin:4px 0; font-size:0.78rem;
}
.asset-item .sell-btn {
  padding:3px 10px; border-radius:10px; border:1px solid var(--orange);
  background:transparent; color:var(--orange); cursor:pointer; font-size:0.7rem;
  transition:all var(--transition);
}
.asset-item .sell-btn:hover { background:var(--orange); color:#000; }

/* Toast */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:200;
  background:var(--green); color:#000; padding:10px 24px; border-radius:20px;
  font-weight:700; font-size:0.9rem; opacity:0; transition:opacity 0.3s;
  pointer-events:none;
}
.toast.show { opacity:1; }
.toast.warn { background:var(--orange); }

/* Hidden */
.hidden { display:none !important; }
</style>

function initPlayer(prof) {

    profession: prof.id,
    cash: prof.savings + prof.salary, // starting cash = savings + 1 month salary
    income: { salary: prof.salary, interest:0, dividend:0, realEstate:0, business:0 },
    expenses: { tax: Math.round(prof.salary*0.25), mortgage:prof.mortgage, schoolLoan:prof.schoolLoan, carLoan:prof.carLoan, creditCard:prof.creditCard, other:prof.other, bankLoan:0, children:0 },

    track: 'ratrace',
    turnsSkipped: 0,

    optionContracts: [], // 202: { symbol, type:'call'|'put', strike, premium, shares }
    startingPortfolio: [], // 202
  };
}

function createGame(profId, dreamId) {
  const prof = PROFESSIONS.find(p => p.id === profId);
  const dream = DREAMS[dreamId];
  const p = initPlayer(prof);
  p.dream = dream;

  // Shuffle decks
  const shuffle = arr => { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; };

  return {
    phase: 'ratrace',
    player: p,
    profession: prof,
    turn: 0,
    dice: [1,1],
    smallDeals: shuffle([...SMALL_DEALS]),
    bigDeals: shuffle([...BIG_DEALS]),
    marketCards: shuffle([...MARKET_CARDS]),
    doodads: shuffle([...DOODADS]),
    marketDrawn: 0,
    eventLog: [],
    currentModal: null,
    waitingForAction: false,
    fastTrackBiz: shuffle([...FASTTRACK_BIZ]),

  };
}

function saveGame() {
  try { localStorage.setItem('cashflow202_save', JSON.stringify(G)); return true; }

function loadGame() {

// ===================================================================
// COMPUTED VALUES
// ===================================================================

function totalIncome(p) {
  if (!p) return 0;
  return (p.income.salary||0) + (p.income.interest||0) + (p.income.dividend||0) + (p.income.realEstate||0) + (p.income.business||0);
}

function totalExpenses(p) {
  if (!p) return 0;
  const e = p.expenses;
  return (e.tax||0) + (e.mortgage||0) + (e.schoolLoan||0) + (e.carLoan||0) + (e.creditCard||0) + (e.other||0) + (e.bankLoan||0) + (e.children||0);
}

function monthlyCashflow(p) { return totalIncome(p) - totalExpenses(p); }

function passiveIncome(p) {
  if (!p) return 0;
  return (p.income.interest||0) + (p.income.dividend||0) + (p.income.realEstate||0) + (p.income.business||0);
}

function netWorth(p) {
  if (!p) return 0;
  let nw = p.cash;
  for (const a of p.assets) nw += (a.cost || 0);
  for (const l of p.liabilities) nw -= (l.amount || 0);
  nw -= p.bankLoanUnits * 1000;
  return nw;
}

function canEscapeRatRace(p) {
  // Cashflow 202: passive income > 2x total expenses
  return passiveIncome(p) > totalExpenses(p) * 2;
}

// ===================================================================
// GAME ACTIONS
// ===================================================================

function logEvent(emoji, text) {
  G.eventLog.unshift({ emoji, text, turn: G.turn });
  if (G.eventLog.length > 200) G.eventLog.length = 200;
}

function recalcFinances() {
  const p = G.player;
  // Reset variable income
  p.income.realEstate = 0;
  p.income.business = 0;
  p.income.dividend = 0;
  p.income.interest = 0;
  // Recalculate from assets
  for (const a of p.assets) {
    if (a.type === 'realestate') p.income.realEstate += (a.cashflow || 0);
    else if (a.type === 'business') p.income.business += (a.cashflow || 0);
    else if (a.type === 'lp') p.income.business += (a.cashflow || 0) * (a.shares || 1);
    else if (a.type === 'bond') p.income.interest += (a.cashflow || 0);
  }
  p.expenses.bankLoan = p.bankLoanUnits * 100; // 10% monthly per $1000 unit
  p.expenses.children = p.children * (G.profession.childExp || 300);
  // Tax is based on salary
  p.expenses.tax = Math.round(p.income.salary * 0.25);
}

function rollDice(count=1) {
  const dice = [];
  for (let i=0;i<count;i++) dice.push(Math.floor(Math.random()*6)+1);
  return dice;
}

function movePlayer(steps) {
  const p = G.player;
  const totalSpaces = RATRACE_SPACES.length;
  const oldPos = p.position;
  p.position = (p.position + steps) % totalSpaces;
  // Check if passed start
  if (oldPos + steps >= totalSpaces) {
    p.cash += monthlyCashflow(p);
    logEvent('🏁', `经过起点，领取月现金流 $${monthlyCashflow(p).toLocaleString()}`);
  }
  return p.position;
}

function drawCard(deck) {
  if (deck.length === 0) return null;
  return deck.pop();
}

function shuffleDeck(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function reshuffleMarketIfNeeded() {
  if (G.marketDrawn >= 25) {
    G.marketCards = shuffleDeck([...MARKET_CARDS]);
    G.marketDrawn = 0;
    logEvent('🔄', '市场卡牌堆已重新洗牌（202规则：每25张重洗）');
  }
}

function handleSpace(spaceType) {
  const p = G.player;
  switch(spaceType) {
    case 'start':
      // Already handled in movePlayer (passing start)
      // If landed exactly on start:
      p.cash += monthlyCashflow(p);
      logEvent('🏁', `停在起点，领取月现金流 $${monthlyCashflow(p).toLocaleString()}`);
      break;
    case 'payday':
      p.cash += monthlyCashflow(p);
      logEvent('💰', `发薪日！领取月现金流 $${monthlyCashflow(p).toLocaleString()}`);
      break;
    case 'smallDeal':
      showDealModal('small');
      G.waitingForAction = true;
      return;
    case 'bigDeal':
      showDealModal('big');
      G.waitingForAction = true;
      return;
    case 'market':
      reshuffleMarketIfNeeded();
      showMarketModal();
      G.waitingForAction = true;
      return;
    case 'doodad':
      showDoodadModal();
      G.waitingForAction = true;
      return;
    case 'baby':
      if (p.children < 3) {
        p.children++;
        recalcFinances();
        logEvent('👶', `生了第${p.children}个孩子！月支出增加 $${G.profession.childExp}`);
      } else {
        logEvent('👶', '已经有3个孩子了，这次没有新增。');
      }
      break;
    case 'downsized':
      const penalty = Math.round(p.income.salary / 2);
      p.cash -= penalty;
      p.turnsSkipped = 2;
      logEvent('📉', `失业！付半月工资 $${penalty.toLocaleString()}，接下来2回合不能行动`);
      break;
    case 'charity':
      showCharityModal();
      G.waitingForAction = true;
      return;
  }
}

// ===================================================================

function processMarketCard(card) {
  const p = G.player;
  switch(card.effect) {
    case 'stockUp':
      // Sell all holdings of this stock at the price
      const upAssets = p.assets.filter(a => a.symbol === card.symbol && a.type === 'stock');
      for (const a of upAssets) {
        const sellValue = a.shares * card.price;
        p.cash += sellValue;
        logEvent('📈', `${card.symbol} 售出 ${a.shares}股 @$${card.price} = +$${sellValue.toLocaleString()}`);
      }
      p.assets = p.assets.filter(a => !(a.symbol === card.symbol && a.type === 'stock'));
      // 202: Check short positions
      if (p.shortPositions && p.shortPositions.length) {
        const sp = p.shortPositions.filter(s => s.symbol === card.symbol);
        for (const s of sp) {
          const loss = s.shares * (s.priceSold - card.price);
          p.cash -= loss;
          logEvent('📉', `做空 ${s.symbol} 亏损！买入平仓，损失 $${loss.toLocaleString()}`);
        }
        p.shortPositions = p.shortPositions.filter(s => s.symbol !== card.symbol);
      }
      break;
    case 'stockDown':
      // 202: Short sellers profit
      if (p.shortPositions && p.shortPositions.length) {
        const sp = p.shortPositions.filter(s => s.symbol === card.symbol);
        for (const s of sp) {
          const profit = s.shares * (s.priceSold - card.price);
          p.cash += profit;
          logEvent('📈', `做空 ${s.symbol} 盈利！${s.shares}股，利润 $${profit.toLocaleString()}`);
        }
        p.shortPositions = p.shortPositions.filter(s => s.symbol !== card.symbol);
      }
      // Stock value drops (just informational unless selling)
      logEvent('📉', `${card.symbol} 跌至 $${card.price}/股`);
      break;
    case 'realEstateUp':
      for (const a of p.assets) {
        if (a.type === 'realestate') {
          a.cashflow = Math.round(a.cashflow * 1.5);
        }
      }
      recalcFinances();
      logEvent('🏠', '房地产市场火热！所有房产月现金流×1.5');
      break;
    case 'realEstateDown':
      for (const a of p.assets) {
        if (a.type === 'realestate') {
          a.cashflow = Math.round(a.cashflow * 0.5);
        }
      }
      recalcFinances();
      logEvent('📉', '房市崩盘！所有房产月现金流减半');
      break;
    case 'goldUp':
      const goldAssets = p.assets.filter(a => a.type === 'commodity' && a.name.includes('金币'));
      for (const a of goldAssets) {
        p.cash += 4000; // 10 coins × $400
        logEvent('🥇', `金币售出：10枚 × $400 = +$4,000`);
      }
      p.assets = p.assets.filter(a => !(a.type === 'commodity' && a.name.includes('金币')));
      break;
    case 'silverUp':
      const silverAssets = p.assets.filter(a => a.type === 'commodity' && a.name.includes('银币'));
      for (const a of silverAssets) {
        p.cash += 3000; // 50 coins × $60
        logEvent('🥈', `银币售出：50枚 × $60 = +$3,000`);
      }
      p.assets = p.assets.filter(a => !(a.type === 'commodity' && a.name.includes('银币')));
      break;
    case 'interestDown':
      p.bankLoanUnitsOld = p.bankLoanUnits;
      p.expenses.bankLoan = p.bankLoanUnits * 50;
      logEvent('📊', '银行降息！贷款利率降至5%');
      break;
    case 'interestUp':
      p.expenses.bankLoan = p.bankLoanUnits * 150;
      logEvent('📊', '银行加息！贷款利率升至15%');
      break;
    case 'dividend':
      const divAssets = p.assets.filter(a => a.symbol === card.symbol && a.type === 'stock');
      for (const a of divAssets) {
        const div = a.shares * card.amount;
        p.cash += div;
        logEvent('💵', `${card.symbol} 分红：${a.shares}股 × $${card.amount} = +$${div.toLocaleString()}`);
      }
      break;
    case 'gift':
      p.cash += card.amount;
      logEvent('🎁', `收到礼物：+$${card.amount.toLocaleString()}`);
      break;
  }
  recalcFinances();
}

function buyStock(card) {
  const p = G.player;
  if (p.cash < card.cost) return;
  p.cash -= card.cost;
  p.assets.push({ ...card, id: Date.now() });
  logEvent('📈', `买入 ${card.name}，$${card.cost.toLocaleString()}`);
  closeModal();
}

function buyRealEstate(card) {
  const p = G.player;
  if (p.cash < card.downPayment) return;
  p.cash -= card.downPayment;
  p.liabilities.push({ name: card.name+'贷款', amount: card.cost - card.downPayment, monthlyPayment: 0 });
  p.assets.push({ ...card, id: Date.now() });
  logEvent('🏠', `买入 ${card.name}，首付$${card.downPayment.toLocaleString()}，月现金流+$${card.cashflow}`);
  recalcFinances();
  closeModal();
}

function buyBusiness(card) {
  const p = G.player;
  if (p.cash < card.downPayment) return;
  p.cash -= card.downPayment;
  p.liabilities.push({ name: card.name+'贷款', amount: card.cost - card.downPayment, monthlyPayment: 0 });
  p.assets.push({ ...card, id: Date.now() });
  logEvent('🏢', `买入 ${card.name}，首付$${card.downPayment.toLocaleString()}，月现金流+$${card.cashflow}`);
  recalcFinances();
  closeModal();
}

function buyLP(card) {
  const p = G.player;
  if (p.cash < card.sharePrice) return;
  p.cash -= card.sharePrice;
  const existing = p.assets.find(a => a.name === card.name);
  if (existing) {
    existing.shares = (existing.shares || 1) + 1;
    existing.cost += card.sharePrice;
  } else {
    p.assets.push({ ...card, id: Date.now(), shares: 1, cost: card.sharePrice });
  }
  logEvent('📈', `买入 ${card.name} 1份，$${card.sharePrice.toLocaleString()}`);
  recalcFinances();
  closeModal();
}

function buyAsset(card) {
  const p = G.player;
  if (p.cash < card.cost) return;
  p.cash -= card.cost;
  p.assets.push({ ...card, id: Date.now() });
  logEvent('🛒', `买入 ${card.name}，$${card.cost.toLocaleString()}`);
  recalcFinances();
  closeModal();
}

function borrowAndBuy(card) {
  const p = G.player;
  const need = (card.downPayment || card.cost) - p.cash;
  const units = Math.ceil(need / 1000);
  p.bankLoanUnits += units;
  p.cash += units * 1000;
  logEvent('🏦', `银行贷款 $${(units*1000).toLocaleString()}（共$${(p.bankLoanUnits*1000).toLocaleString()}）`);
  recalcFinances();
  // Now try to buy
  closeModal();
  if (card.type === 'stock') buyStock(card);
  else if (card.type === 'realestate') buyRealEstate(card);
  else if (card.type === 'business') buyBusiness(card);
  else if (card.type === 'lp') buyLP(card);
  else buyAsset(card);
}

function borrowMoney(amount) {
  const p = G.player;
  const units = Math.ceil(amount / 1000);
  p.bankLoanUnits += units;
  p.cash += units * 1000;

function doShortSell(symbol, shares, price) {
  const p = G.player;
  p.cash += shares * price; // Receive money from short sale
  p.shortPositions.push({ symbol, shares, priceSold: price });
  logEvent('🔻', `做空 ${symbol}：卖出 ${shares}股 @$${price}，收到 $${(shares*price).toLocaleString()}（等待低价买回）`);
  recalcFinances();
  closeModal();

function sellAsset(assetId) {
  const p = G.player;
  const idx = p.assets.findIndex(a => a.id === assetId);
  if (idx < 0) return;
  const a = p.assets[idx];
  const sellPrice = Math.round(a.cost * 0.8); // 80% of original cost
  p.cash += sellPrice;
  p.assets.splice(idx, 1);
  // Remove associated liability
  p.liabilities = p.liabilities.filter(l => !l.name.includes(a.name));
  logEvent('💸', `卖出 ${a.name}，回收 $${sellPrice.toLocaleString()}`);
  recalcFinances();
  renderAll();
}

function repayLoan() {
  const p = G.player;
  if (p.bankLoanUnits <= 0) return;
  if (p.cash < 1000) { showToast('现金不足 $1000 还贷', 'warn'); return; }
  p.bankLoanUnits--;
  p.cash -= 1000;
  logEvent('🏦', `偿还银行贷款 $1000（剩余 $${(p.bankLoanUnits*1000).toLocaleString()}）`);
  recalcFinances();
  renderAll();
}

function processFastTrackSpace(pos) {
  const p = G.player;
  const bizCount = FASTTRACK_BIZ.length;
  // Simplified fast track: every 3 spaces is a business, every 7 is cashflow day, every 5 is a risk
  if (pos % 7 === 0) {
    // Cashflow Day
    p.cash += passiveIncome(p);
    logEvent('💵', `现金流日！领取 $${passiveIncome(p).toLocaleString()}`);
  } else if (pos % 3 === 0 && G.fastTrackBiz.length > 0) {
    // Business opportunity
    showFastTrackBizModal();
    G.waitingForAction = true;
    return;
  } else if (pos % 5 === 0) {
    // Risk
    const risks = [
      { text:'税务审计', cost: Math.round(p.cash * 0.5), icon:'📋' },
      { text:'离婚', cost: p.cash, icon:'💔' },
      { text:'诉讼', cost: Math.round(p.cash * 0.5), icon:'⚖️' },
    ];
    const risk = risks[Math.floor(Math.random() * risks.length)];
    p.cash -= risk.cost;
    logEvent(risk.icon, `${risk.text}：损失 $${risk.cost.toLocaleString()}`);
  }
  // Check for dream
  if (p.dream && pos % 11 === 0 && p.cash >= p.dream.cost) {
    p.cash -= p.dream.cost;
    G.phase = 'won';
    logEvent('🌟', `🏆 实现梦想「${p.dream.name}」！你赢了！`);
  }
  // Check $50k monthly income win
  if (passiveIncome(p) >= 50000) {
    G.phase = 'won';
    logEvent('🏆', `💰 快车道月现金流达到 $${passiveIncome(p).toLocaleString()}！财务自由达成！`);
  }
}

function doRollDice() {
  if (G.waitingForAction) return;
  const p = G.player;

  // Check for skipped turns
  if (p.turnsSkipped > 0) {
    p.turnsSkipped--;
    logEvent('⏸️', `失业中…还需等待 ${p.turnsSkipped} 回合`);
    G.turn++;
    renderAll();
    return;
  }

  // Roll dice: 2 dice normal, 3 dice with charity
  const diceCount = p.charityActive > 0 ? 3 : 2;
  G.dice = rollDice(diceCount);
  const totalSteps = G.dice.reduce((a,b) => a+b, 0);
  if (p.charityActive > 0) p.charityActive--;
  G.turn++;

  // Animate dice
  animateDice(G.dice, () => {
    // Move player
    if (p.track === 'ratrace') {
      const newPos = movePlayer(totalSteps);
      handleSpace(RATRACE_SPACES[newPos].type);

      // Check escape condition
      if (canEscapeRatRace(p)) {
        setTimeout(() => {
          showModal(`
            <h2>🚀 恭喜！跳出老鼠赛跑！</h2>
            <div class="card-detail" style="text-align:center;">
              <div style="font-size:3rem;">🚀</div>
              <p>被动收入 <strong>$${passiveIncome(p).toLocaleString()}/月</strong></p>
              <p> > 2× 总支出 <strong>$${(totalExpenses(p)*2).toLocaleString()}/月</strong></p>
              <p style="margin-top:8px;">买断资金：<strong style="color:var(--green);">$${(passiveIncome(p)*100).toLocaleString()}</strong></p>
            </div>
            <div class="actions">
              <button class="btn primary" onclick="enterFastTrack();closeModal();">🚀 进入快车道！</button>
            </div>
          `);
        }, 500);
      }
    } else {
      // Fast Track
      G.fastTrackPos += totalSteps;
      processFastTrackSpace(G.fastTrackPos);
    }

    // Auto-save every 5 turns
    if (G.turn % 5 === 0) {
      saveGame();
      showToast('💾 游戏已自动保存');
    }

    if (G.phase === 'won') {
      setTimeout(() => {
        showModal(`
          <h2>🏆 财务自由！</h2>
          <div class="card-detail" style="text-align:center;">
            <div style="font-size:4rem;">🏆</div>
            <p>恭喜！你实现了财务自由！</p>
            ${p.dream ? `<p>梦想：<strong>${p.dream.icon} ${p.dream.name}</strong></p>` : ''}
            <p>总回合：<strong>${G.turn}</strong></p>
            <p>净资产：<strong>$${netWorth(p).toLocaleString()}</strong></p>
          </div>
          <div class="actions">
            <button class="btn primary" onclick="resetGame()">🔄 再来一局</button>
          </div>
        `);
      }, 800);
    }

    renderAll();
  });
}

function animateDice(dice, callback) {
  const diceEls = document.querySelectorAll('.die');
  let count = 0;
  const maxFrames = 10;
  const interval = setInterval(() => {
    diceEls.forEach((el, i) => {
      if (i < dice.length) {
        el.textContent = Math.floor(Math.random()*6)+1;
        el.classList.add('rolling');
      }
    });
    count++;
    if (count >= maxFrames) {
      clearInterval(interval);
      diceEls.forEach((el, i) => {
        el.classList.remove('rolling');
        if (i < dice.length) el.textContent = dice[i];
      });
      setTimeout(callback, 200);
    }
  }, 100);
}

function renderBoard() {
  const svg = document.getElementById('board-svg');
  const p = G.player;
  const cx = 300, cy = 240;

  let html = '';

  if (p.track === 'ratrace') {
    // Draw outer fast track ring (dimmed)
    html += `<circle cx="${cx}" cy="${cy}" r="210" fill="none" stroke="var(--surface2)" stroke-width="40" opacity="0.4"/>`;
    // Draw inner rat race ring
    html += `<circle cx="${cx}" cy="${cy}" r="140" fill="none" stroke="var(--surface2)" stroke-width="50"/>`;

    // Rat race spaces (24 spaces)
    const n = RATRACE_SPACES.length;
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const r = 140;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      const isCurrent = i === p.position;
      const space = RATRACE_SPACES[i];

      // Color by type
      const typeColors = {
        start:'#00d69c', payday:'#00d69c',
        bigDeal:'#7c5cfc', smallDeal:'#54a0ff',
        market:'#ff9f43', doodad:'#ff6b81',
        baby:'#feca57', downsized:'#ff4757',
        charity:'#00d2d3'
      };
      const tc = typeColors[space.type] || 'var(--border)';

      let fill = 'var(--surface)';
      let stroke = tc;
      if (isCurrent) { fill = '#fff'; stroke = '#fff'; }

      html += `<circle cx="${x}" cy="${y}" r="${isCurrent?18:9}" fill="${fill}" stroke="${stroke}" stroke-width="${isCurrent?3:2}" class="space-dot" data-idx="${i}"/>`;
      // Show icon on all spaces
      html += `<text x="${x}" y="${y+3}" text-anchor="middle" fill="${isCurrent?'#000':'var(--text-dim)'}" font-size="${isCurrent?10:7}" font-weight="${isCurrent?'bold':'normal'}">${space.icon}</text>`;
      // Show label on current space
      if (isCurrent) {
        html += `<text x="${x}" y="${y-24}" text-anchor="middle" fill="var(--yellow)" font-size="10" font-weight="bold">📍${space.label}</text>`;
        // Glow ring
        html += `<circle cx="${x}" cy="${y}" r="22" fill="none" stroke="var(--yellow)" stroke-width="1.5" opacity="0.6"><animate attributeName="r" from="22" to="28" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.6" to="0" dur="1s" repeatCount="indefinite"/></circle>`;
      }
    }
  } else {
    // Fast Track view
    html += `<circle cx="${cx}" cy="${cy}" r="210" fill="none" stroke="var(--surface2)" stroke-width="40"/>`;
    html += `<circle cx="${cx}" cy="${cy}" r="140" fill="none" stroke="var(--surface2)" stroke-width="50" opacity="0.3"/>`;

    // Fast track spaces (simplified: 30 positions around the ring)
    const n = 30;
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const r = 210;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      const isCurrent = i === (G.fastTrackPos % n);

      let fill = 'var(--surface)';
      if (isCurrent) fill = 'var(--yellow)';

      html += `<circle cx="${x}" cy="${y}" r="${isCurrent?14:8}" fill="${fill}" stroke="var(--border)" stroke-width="${isCurrent?3:1}"/>`;

      if (i % 3 === 0) html += `<text x="${x}" y="${y}" text-anchor="middle" fill="var(--yellow)" font-size="7">🏢</text>`;
      if (i % 7 === 0) html += `<text x="${x}" y="${y}" text-anchor="middle" fill="var(--green)" font-size="7">💵</text>`;

      if (isCurrent) {
        html += `<text x="${x}" y="${y-18}" text-anchor="middle" fill="var(--yellow)" font-size="10" font-weight="bold">📍</text>`;
        // Dream indicator
        if (p.dream && i % 11 === 0) {
          html += `<text x="${x}" y="${y+22}" text-anchor="middle" fill="var(--pink)" font-size="7">🌟${p.dream.icon}</text>`;
        }
      }
    }
  }

  // Center label
  html += `<text x="${cx}" y="${cy}" text-anchor="middle" fill="var(--text-dim)" font-size="12">${p.track==='ratrace'?'🐭 鼠赛跑':'🚀 快车道'}</text>`;
  html += `<text x="${cx}" y="${cy+18}" text-anchor="middle" fill="var(--text-dim)" font-size="10">第 ${G.turn} 回合</text>`;

  svg.innerHTML = html;
}

    }

    html += `<button class="btn" onclick="showBorrowModal()">🏦 贷款</button>`;
    html += `<button class="btn" onclick="repayLoan()" ${p.bankLoanUnits<=0?'disabled':''}>💳 还贷</button>`;

    // 202: Short selling button
    if (p.track === 'ratrace') {
      html += `<button class="btn" style="border-color:var(--orange);color:var(--orange);" onclick="showShortSellModal()">🔻 做空</button>`;
    }

    html += `<button class="btn" onclick="if(saveGame())showToast('💾 已保存')">💾 存档</button>`;
    html += `<button class="btn" onclick="resetGame()">🔄 重来</button>`;
    html += `<button class="btn" onclick="goToMenu()" style="border-color:var(--cyan);color:var(--cyan);">🏠 菜单</button>`;
  }

  document.getElementById('action-bar').innerHTML = html;
}

function renderEventLog() {
  const el = document.getElementById('event-log');
  el.innerHTML = G.eventLog.slice(0, 30).map(e =>
    `<div class="entry"><span class="emoji">${e.emoji}</span>[T${e.turn}] ${e.text}</div>`
  ).join('');
}

function renderTurnInfo() {
  document.getElementById('turn-info').innerHTML = `
    <span>📅 第 ${G.turn} 回合</span>
    <span>👶 ${G.player.children} 个孩子</span>
    <span>🏦 贷款 $${(G.player.bankLoanUnits*1000).toLocaleString()}</span>
    <span>💵 现金 $${G.player.cash.toLocaleString()}</span>
  `;
}

function renderAll() {
  if (!G || G.phase === 'menu') return;
  renderBoard();
  renderSheet();
  renderActions();
  renderEventLog();
  renderTurnInfo();
}

function startGame(profId, dreamId) {
  G = createGame(profId, dreamId);
  logEvent('🎮', `新游戏开始！职业：${PROFESSIONS.find(p=>p.id===profId).name}，梦想：${DREAMS[dreamId].name}`);
  saveGame(); // Explicitly save before reload
  location.reload();
}

function loadSavedGame() {
  G = loadGame();
  if (G) {
    // Recreate missing methods
    logEvent('💾', '存档已加载');
    location.reload();
  }
}

// ===================================================================
// INIT
// ===================================================================

function init() {
  // Check if game already started
  if (G && G.phase !== 'menu') {
    renderAll();
    return;
  }

  // Try to load save
  const saved = loadGame();
  if (saved) {
    G = saved;
    G.waitingForAction = false;
    document.getElementById('board-title').textContent = G.player.track === 'ratrace' ? '🐭 老鼠赛跑 · Rat Race' : '🚀 快车道 · Fast Track';
    renderAll();
    return;
  }

  // No save — show career selection
  showCareerScreen();
}

// On page load
if (G === null) {
  // Check localStorage first
  const saved = loadGame();
  if (saved) {
    G = saved;
    G.waitingForAction = false;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (G) {
    document.getElementById('board-title').textContent = G.player.track === 'ratrace' ? '🐭 老鼠赛跑 · Rat Race' : '🚀 快车道 · Fast Track';
    renderAll();
  } else {
    showCareerScreen();
  }
});

// Keyboard shortcut: Space to roll dice
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && G && G.phase !== 'menu' && G.phase !== 'won') {
    // Don't trigger when typing in input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    doRollDice();
  }
});

// Save before close
window.addEventListener('beforeunload', () => {
  if (!_noSave && G && G.phase !== 'menu' && G.phase !== 'won') {
    saveGame();
  }
});
</script>
