<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #0a0a14;
  --surface: #141428;
  --surface2: #1e1e3a;
  --border: #282850;
  --text: #e4e4f0;
  --text-dim: #8080a8;
  --primary: #7c5cfc;
  --primary-glow: rgba(124,92,252,0.25);
  --green: #00d69c; --blue: #54a0ff; --orange: #ff9f43;
  --pink: #ff6b81; --cyan: #00d2d3; --yellow: #feca57;
  --radius: 14px; --transition: 0.2s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% -10%, var(--primary-glow), transparent),
    radial-gradient(ellipse 50% 30% at 85% 90%, rgba(0,210,156,0.06), transparent);
  background-attachment: fixed;
}
.container { max-width: 1280px; margin:0 auto; padding:0 24px; }

/* ===== Header ===== */
header { text-align:center; padding:56px 0 20px; }
header h1 {
  font-size:2.4rem; font-weight:800; letter-spacing:-1px;
  background:linear-gradient(135deg, var(--primary), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
header .sub { color:var(--text-dim); margin-top:6px; font-size:0.92rem; }
#stats-bar {
  display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
  margin-top:16px; font-size:0.8rem; color:var(--text-dim);
}
#stats-bar span { background:var(--surface2); padding:4px 12px; border-radius:12px; }

/* ===== Search ===== */
.search-wrap { max-width:520px; margin:0 auto 28px; position:relative; }
.search-wrap input {
  width:100%; padding:14px 52px 14px 20px;
  border-radius:28px; border:2px solid var(--border);
  background:var(--surface); color:var(--text); font-size:0.95rem;
  outline:none; transition:border var(--transition), box-shadow var(--transition);
}
.search-wrap input:focus { border-color:var(--primary); box-shadow:0 0 28px var(--primary-glow); }
.search-wrap kbd {
  position:absolute; right:16px; top:50%; transform:translateY(-50%);
  background:var(--surface2); border:1px solid var(--border);
  padding:2px 8px; border-radius:6px; font-size:0.7rem; color:var(--text-dim);
  pointer-events:none; transition:opacity 0.2s;
}
.search-wrap input:focus + kbd { opacity:0; }

/* ===== Tabs ===== */
.tabs { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:28px; }
.tab {
  padding:7px 18px; border-radius:18px; border:1px solid var(--border);
  background:transparent; color:var(--text-dim); cursor:pointer;
  font-size:0.85rem; transition:all var(--transition); white-space:nowrap;
  user-select:none;
}
.tab:hover { color:var(--text); border-color:var(--text-dim); }
.tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.tab .count { margin-left:3px; font-size:0.7rem; opacity:0.65; }
.tab-fav { color:var(--yellow) !important; border-color:var(--yellow) !important; }
.tab-fav.active { background:var(--yellow) !important; color:#000 !important; }

/* ===== Grid ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
  gap:14px; margin-bottom:48px;
}
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px;
  transition:all var(--transition); cursor:pointer;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.card:hover { transform:translateY(-3px); border-color:var(--card-accent,var(--primary)); box-shadow:0 8px 32px rgba(0,0,0,0.35); }
.card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:3px; background:var(--card-accent,var(--primary));
  border-radius:var(--radius) var(--radius) 0 0;
}
.card.visited::after {
  content:'✓'; position:absolute; top:10px; right:36px;
  font-size:0.65rem; color:var(--green); opacity:0.7;
}
.card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.card-icon {
  width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; background:var(--surface2); flex-shrink:0;
}
.card-title { font-weight:600; font-size:1rem; }
.card-desc { color:var(--text-dim); font-size:0.82rem; line-height:1.5; flex:1; }
.card-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:10px; }
.tag { padding:2px 9px; border-radius:8px; font-size:0.68rem; background:rgba(255,255,255,0.04); color:var(--text-dim); }
.tag.hot { background:rgba(255,107,129,0.1); color:var(--pink); }

/* Star button */
.star-btn {
  position:absolute; top:10px; right:10px;
  background:none; border:none; font-size:1rem; cursor:pointer;
  opacity:0; transition:all var(--transition); z-index:2;
  color:var(--text-dim); padding:4px;
}
.card:hover .star-btn { opacity:1; }
.star-btn.faved { opacity:1 !important; color:var(--yellow); }

/* ===== No results ===== */
.no-results { text-align:center; padding:60px 20px; color:var(--text-dim); display:none; }
.no-results .emoji { font-size:3rem; display:block; margin-bottom:12px; }

/* ===== Footer ===== */
footer { text-align:center; padding:28px 0 40px; border-top:1px solid var(--border); color:var(--text-dim); font-size:0.78rem; }
footer a { color:var(--primary); text-decoration:none; }

/* ===== Back to top ===== */
#back-top {
  position:fixed; bottom:28px; right:28px; width:42px; height:42px;
  border-radius:50%; border:1px solid var(--border); background:var(--surface);
  color:var(--text); cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(10px); transition:all var(--transition); z-index:99;
}
#back-top.visible { opacity:1; transform:translateY(0); }

/* ===== Accent colors ===== */
.a-purple{--card-accent:#7c5cfc} .a-green{--card-accent:#00d69c}
.a-blue{--card-accent:#54a0ff} .a-orange{--card-accent:#ff9f43}
.a-pink{--card-accent:#ff6b81} .a-cyan{--card-accent:#00d2d3}
.a-yellow{--card-accent:#feca57} .a-red{--card-accent:#ff4757}

/* ===== Responsive ===== */
@media(max-width:640px){
  header{padding:36px 0 16px} header h1{font-size:1.6rem}
  .grid{grid-template-columns:1fr} .tabs{gap:3px}
  .tab{padding:5px 12px; font-size:0.78rem}
  #stats-bar{font-size:0.72rem; gap:6px}
}

// ===================================================================
// 分类定义
// ===================================================================
const CATS = [
  { id:"all",  name:"全部", icon:"🌟" },
  { id:"ai",   name:"AI 工具", icon:"🤖" },
  { id:"dev",  name:"编程开发", icon:"💻" },
  { id:"embed",name:"嵌入式硬件", icon:"🔌" },
  { id:"anime",name:"动漫资源", icon:"🎬" },
  { id:"search",name:"资源搜索", icon:"🔍" },
  { id:"learn",name:"学习资源", icon:"📚" },
  { id:"resource",name:"网盘资源", icon:"📥" },
  { id:"nav",  name:"导航大全", icon:"🧭" },
  { id:"favs", name:"我的收藏", icon:"⭐" },
];

// ===================================================================
// 状态
// ===================================================================
let activeCat = "all";
let query = "";
let favorites = JSON.parse(localStorage.getItem("mynav_favs") || "[]");
let visited = JSON.parse(localStorage.getItem("mynav_visited") || "[]");

// ===================================================================
// 渲染
// ===================================================================
function updateStats() {
  const el = document.getElementById("stats-bar");
  const total = LINKS.length;
  const favs = favorites.length;
  el.innerHTML = `
    <span>📊 共 ${total} 个链接</span>
    <span>📂 ${CATS.length-1} 个分类</span>
    <span>⭐ ${favs} 个收藏</span>
    <span>📝 ${visited.length} 次访问</span>
  `;
}

function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = CATS.map(c => {
    const cnt = c.id==="all" ? LINKS.length :
      c.id==="favs" ? favorites.length :
      LINKS.filter(l => l.cat === c.id).length;
    const isFav = c.id === "favs";
    return `<button class="tab${c.id===activeCat?' active':''}${isFav?' tab-fav':''}"
      data-cat="${c.id}">${c.icon} ${c.name}<span class="count">${cnt}</span></button>`;
  }).join("");

  container.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => { activeCat = t.dataset.cat; renderAll(); });
  });
}

function renderCards() {
  let links;
  if (activeCat === "favs") {
    links = LINKS.filter(l => favorites.includes(l.url));
  } else {
    links = LINKS.filter(l => {
      const matchCat = activeCat === "all" || l.cat === activeCat;
      const matchQ = !query ||
        l.title.toLowerCase().includes(query) ||
        l.desc.toLowerCase().includes(query) ||
        l.tags.some(t => t.toLowerCase().includes(query));
      return matchCat && matchQ;
    });
  }

  const grid = document.getElementById("grid");
  const noRes = document.getElementById("no-results");

  if (links.length === 0) {
    grid.innerHTML = "";
    noRes.style.display = "block";
    if (activeCat === "favs") {
      noRes.innerHTML = '<span class="emoji">⭐</span><p>还没有收藏任何链接</p><p style="font-size:0.85rem;color:var(--text-dim)">点击卡片右上角的 ☆ 即可收藏</p>';
    }
    return;
  }
  noRes.style.display = "none";

  grid.innerHTML = links.map(link => {
    const isFav = favorites.includes(link.url);
    const isVisited = visited.includes(link.url);
    const accent = `a-${link.a || 'purple'}`;
    const tagsHtml = link.tags.map(t => `<span class="tag${t==='免费'||t==='开源'?' hot':''}">${t}</span>`).join("");

    return `
    <div class="card ${accent}${isVisited?' visited':''}" data-url="${link.url}">
      <button class="star-btn${isFav?' faved':''}" data-url="${link.url}" title="${isFav?'取消收藏':'收藏'}">
        ${isFav ? '★' : '☆'}
      </button>
      <div class="card-header">
        <div class="card-icon">${link.icon}</div>
        <div class="card-title">${link.title}</div>
      </div>
      <div class="card-desc">${link.desc}</div>
      <div class="card-tags">${tagsHtml}</div>
    </div>`;
  }).join("");

  // 卡片点击 → 打开链接
  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest(".star-btn")) return;
      const url = card.dataset.url;
      if (url && url !== "#") {
        if (!visited.includes(url)) { visited.push(url); localStorage.setItem("mynav_visited", JSON.stringify(visited)); }
        window.open(url, "_blank");
        renderCards(); updateStats();
      }
    });
  });

  // 收藏按钮
  grid.querySelectorAll(".star-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const url = btn.dataset.url;
      if (favorites.includes(url)) {
        favorites = favorites.filter(u => u !== url);
      } else {
        favorites.push(url);
      }
      localStorage.setItem("mynav_favs", JSON.stringify(favorites));
      renderCards(); updateStats();
    });
  });
}

function renderAll() {
  renderTabs();
  renderCards();
  updateStats();
}

// ===================================================================
// 搜索
// ===================================================================
function initSearch() {
  const input = document.getElementById("search");
  input.addEventListener("input", () => {
    query = input.value.trim().toLowerCase();
    if (query && activeCat === "favs") { activeCat = "all"; }
    renderAll();
  });
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey||e.metaKey) && e.key==="k") { e.preventDefault(); input.focus(); input.select(); }
    // 数字键切换分类
    if (!e.ctrlKey && !e.metaKey && !e.altKey && document.activeElement !== input) {
      const num = parseInt(e.key);
      if (num >= 1 && num <= CATS.length) { activeCat = CATS[num-1].id; renderAll(); }
    }
  });
}

// ===================================================================
// 回到顶部
// ===================================================================
function initBackTop() {
  const btn = document.getElementById("back-top");
  window.addEventListener("scroll", () => btn.classList.toggle("visible", scrollY > 400));
  btn.addEventListener("click", () => scrollTo({top:0,behavior:"smooth"}));
}

// ===================================================================
// 启动
// ===================================================================
function init() {
  initSearch();
  initBackTop();
  renderAll();
}
init();
